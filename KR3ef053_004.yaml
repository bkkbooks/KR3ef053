body:
  text: 卷四述壞病壞病者誤治之後陰陽無復綱紀證候變亂難以正名名是也巢源有時氣敗候曰此謂病後餘毒未盡形候變轉久而不瘥陰陽無復綱紀壞病之義得之益明蓋壞崩壞也猶牆壁之壞不得言之牆壁其證候變亂難以正名者不得已姑以壞病命之非有他意方氏曰血氣既憊壞張志聰曰自敗曰壞二説為失方氏又曰壞言歷遍諸治而不愈此亦不妥一誤亦為壞病不必歷遍諸治玩三若字自知程氏柯氏所解極是志聰又曰已發汗則肌表之邪已去此語亦有病發汗違節亦為壞病且壞病中有表猶在者如桂枝加附子去芍藥之類是也少陽篇壞病條難解脈沉緊金鑑改作沉弦然沉字遂不通尤氏有説亦欠穩貼不録其揭讝語一證者豈唯謂邪轉入里者乎然從巢源削讝語二字義似稍勝柴胡證罷似指小柴胡證罷不必柴胡諸方不可用也或得之誤汗或得之誤下或誤吐或溫針而營衛乖錯邪熱沉漬或著上焦或迫血分或陽氣虛憊或陰液竭乏或水飲相搏或濕熱內蒸劇易緩急種種不同皆是因素稟強弱宿疾有無與誤逆之輕重而有異已所謂汗後之汗漏動經胸滿悸築下後之結胸痞硬協熱下利吐後之內煩吐食火逆之驚狂奔豚之類其證多端不勝枚舉今就其情機為之區辨並諸兼證以述於後故茲不得詳也喻氏曰陽明何以無壞病邪曰陽明之誤治最多其脈證固當辨別但不得以壞病名之也蓋使汗下燒針屢誤其病亦止在胃中原有定法可施與壞證無定法之例微有不協錢氏曰六經之中仲景獨以陽經之太少為言者蓋以在表之誤治居多在裡之誤治少也且二經之表裡虛實疑似多端難於察識其誤治獨多變逆尤甚其害有不可勝言者故特立此一法以重其事也學者其可忽諸今考陽明不能無壞病錢説為優三陰亦不言壞病蓋其最罕有者矣活人書曰蓋為病中又感異氣變為壞病此係謬讀傷寒例若更感異氣變為他病者當依後壞病證而治之一語趙氏有辨未核述兼變諸證兼變者兼挾變壞之謂也仲景所立唯是三陽三陰今更設此目豈不愆邪曰否經雖分六病而不特六病之正證彼六病之所兼所變皆具列於其中倘不加甄辨則至並正證而不能明今設此目即所以使學者於正證與兼變能判然別白然每證必稱何病之類變以見病之條理不出於三陽三陰六者之外焉曰然則如漏汗動經之類實系壞病而今更揭仲景所未言之名者何也曰壞病是誤治後變壞者爾今斯諸證有兼於未病之前者有不經誤治而變者此所以不能題以壞病而自立此名也其分類者八曰虛乏曰熱鬱曰飲邪搏聚曰飲邪並結曰血熱瘀血曰熱入血室曰風濕曰濕熱寒濕是也火逆諸證少余義可述故闕焉不録抑前注家如錢氏尤氏及徐大椿既分正變諸法然冗雜無統今不敢從云虛乏虛乏者氣血虛乏是也蓋人身氣血相藉以榮養形骸故氣虛則血亦虛血虛則氣亦虛然稟素或有偏勝而誤治亦有偏害是以其證不一有平素液少不可徑汗者有平素虛弱得病更加者有發汗過多及汗下錯行氣血俱虛者有汗下失度胸中陽虛者有誤下中虛者有誤下下脫者有大邪已解胃虛生寒者有大邪已解胃虛生熱者皆病之屬虛者中間雖未必不變為陰證猶未足言之真陰證仍並類列於此程氏曰汗多亡陽夫人知之矣然人身之陽部分各有所主有衛外之陽為周身營沖之主此陽虛遂有汗漏不止惡寒身疼痛之證有腎中之陽為下焦真元之主此陽虛遂有發熱眩悸身瞤動欲劈地之證有膻中之陽為上焦心氣之主此陽虛遂有叉手冒心耳聾及奔豚之證有胃中之陽為中焦水穀化生之主此陽虛遂有腹脹滿胃中不和而成心下痞之證雖皆從發汗後所得在救誤者須觀其脈證知犯何逆以法治之不得以汗後亡陽一語混同此説出生薑瀉心湯下殆覺精鑿內藤希哲有三焦各有陽虛有陰虛之論蓋本此有平素液少不可徑汗者何蓋其人縱有可汗之證倘平素血液虧乏者要須顧慮放膽施治必致變敗如身疼痛尺中遲即其明律也柯氏曰脈浮緊者以脈法論當身疼痛宜發其汗然寸口雖浮緊而尺中遲則不得據此法矣尺主血血少則營氣不足雖發汗決不能作汗正氣反虛不特身疼不除而亡血亡津液之變起矣此解亦約核如禁汗六條俱系驗之宿疾之法咽喉乾燥上焦液少者也咽喉津液上潮之道路人曾有某故如金匱所敘肺萎所因之類乃為乾燥錢氏專屬少陰似拘尤氏曰若強發之乾燥益甚為咳為咽痛為吐膿血無所不至矣淋家下焦津乾者也成氏曰膀胱裡熱則淋反以湯藥發汗亡耗津液增損一作益客熱膀胱虛燥故小便血瘡家軀殼血乏者也瘡家蓋謂金瘡家此軀殼血乏其得傷寒倘過汗之筋脈益燥遂為痙病與破傷風其由稍異但下條有亡血家乃似相復矣然金匱亦有亡血與身有瘡對待者亡血言血從內亡此血從外失也考瘡古瘡痍之義説文曰刃傷也從刃從一創或從刀倉聲大徐曰今俗別作瘡非是也據此平脈法以手把刃坐作瘡也金匱若身有瘡被刀斧所傷亡血故也並可與本條互徵矣瘍腫古亦或用創字蓋假借也衄家血燥於上者也脈急緊尤氏以為寸口脈非是亡血家血亡於內而外隨虛者也張志聰曰此言吐血便血及婦人崩淋亡血者是又下後發汗振寒脈微細其機相似汗家液竭於表者也張志聰曰夫汗家則虛其水穀之精矣中焦之津液入心化赤而為血下挾膀胱而運行於膚表水穀之津液虛而重發其汗則上動心主之血液而恍惚心亂矣下動膀胱之所藏則小便已而陰疼矣此方失薄或有配合又伊澤信恬曰此條考前後諸條亦系禁汗之例不須自主一方蓋與禹餘糧丸數字衍文也兩説似有理此六者血液所虧之處各異故過汗之變亦各殊矣蓋此諸證皆陰虛陽亢劇則必益燥熱不敢變為陰矣但液少之人其得表證倘不發汗恐無邪解之日乃當別設關防是在活通已汪氏所擬諸方小建中湯黃耆建中湯最似切當魏氏於瘡家處葛根芩連湯亦似當考外臺範汪論黃帝問於岐伯曰當發汗而其人適失血及大下利如之何岐伯答曰數少與桂枝湯使體潤漐漐汗才出連日如此自當解也今更審經文有麻黃證兼虛姑用桂枝者則此諸條證或宜遵用他如栝樓桂枝湯之兼潤桂枝加芍藥生薑人參新加湯之兼補亦必有適如桂枝加附子湯或宜汗家如陽旦湯之兼涼或宜血分燥熱如竹葉湯之清溫合用或宜陽虛液燥蓋後賢方法亦須臨時酌用金匱曰夫病痼疾加以卒病當先治其卒病後乃治其痼疾也然則此等諸證亦重在逐邪但其不宜不顧慮最要活意變通豈是仲景之所以不定一方乎如張倬傷寒兼證析義可謂徒求之筌蹄之末而毫無裨實際者也有平素虛弱得病更加者何如小建中湯證其人胃中虛燥有寒得病更甚一則二三日一則少陽病而見其候俱用此方以溫建中藏腹中急痛條就汪注考之其不舉少陽證者蓋省文也此裡寒為少陽之邪所鼓動故腹中急痛治法先用此方亦猶先與四逆之意而痛未止者裡寒雖散而邪氣犯胃所致故換以小柴胡乎陶氏曰方家用飴糖乃云膠飴皆是濕糖如厚蜜者建中湯多用之其凝強及牽白者不入藥仲景溫養中焦之劑建中理中實相對設建中主潤理中主燥而俱取救陽矣其人胃津不足陽虛生寒者建中以和液而溫中胃氣不足陰寒內盛者理中以逐濕而散寒蓋溫養之法實不能出二方之範圍也如炙甘草湯證素常上焦液乏而不能任邪者故主此方以滋養之脈結代不是二脈兼見要不過歇止之謂成氏曰心中悸動知真氣內虛也汪氏曰悸心動也心中動悸則知營血內虛真氣已餒而藏神不寧也並是以悸為心動之悸與金鑑不同據玉函殆可備一説又金鑑心下築築云云心下字不妥當是虛里膻中動築此方金匱附方載治虛勞又治肺萎俱足見其潤養之功且經中藥之濃煮者莫如本湯及桂枝加芍藥生薑人參新加湯豈陶氏所謂補湯欲熟之義歟張氏類經論虛里跳動以純甘壯水之劑填補真陰其説甚精以足發此方之理宜參又醫學入門曰十全大補湯十四味建中湯一切峻補之劑皆自理中建中四逆等湯而變化之也單甘草湯滋陰降火湯生脈散補中益氣湯一切滋補之劑皆自炙甘草湯而變化之也如陽明病無汗身如蟲行者亦素虛所致也趙氏曰蟲行皮狀者即經言身癢是也久虛者以表氣不足津液不充於皮膚使腠理枯澀汗難出也此亦一説四十八難曰癢者為虛有發汗過多及汗下錯行氣血俱虛者何如甘草乾薑湯芍藥甘草湯證是氣血素虧今依過汗更益虛乏而其證各見故藥亦別行先救其陽後救其陰成氏曰內經云辛甘發散為陽甘草乾薑相合以復陽氣又曰酸以收之甘以緩之酸甘相合用補陰血如芍藥甘草附子湯證亦氣血俱虛而其病頗重既變少陰治宜急救故單捷之劑以雙補之如桂枝加附子湯證汗多亡陽筋脈津燥其表未解脫勢亦劇故用此方復陽斂液聖濟治産後榮血虛損汗出日夕不止形體困怠附子湯於本方加生乾地黃如桂枝如芍藥生薑各一兩人參三兩新加湯證亦是汗後虛燥其邪已除脫勢梢緩故治取漸救新加之名注家多費曲解特程氏曰新加人參而倍薑芍因知新加字專為人參而言蓋芍薑本方固有而人參本方所無故彼但言加此言薪加以為其別也山田正珍説亦然或執桂枝加大黃湯以駁此説則拘矣此二方並亦雙補而專救陽者也如大青龍湯之逆二證俱不出桂枝加附子芍藥甘草附子湯之法而厥逆筋惕肉瞤乃其重者也此與真武證其機似不同如遵張介賓法則六味回陽飲為其對治矣如脈浮數下之身重心悸證即誤下致虛與過汗同轍者也程氏曰津液下奪則機關不利故身重津液下奪則不能上奉故心悸所恃表氣未虛津液不至全亡只是要和之蓋陰生於陽陰液耗者陽氣必不可重虧也表裡實則津液自和不過養正而邪自除之意按尺中以候陰故程氏有此解也如太陽病先下復發汗因致冒證其病本輕故汗下失序而氣血俱虛矣此條為汗下先後之例而設以臆測之此本兼有表裡證醫以里為急而先下之後見表仍在以發其汗然被下之際表邪不陷亦似表裡之熱從汗下解乃知其病俱輕但以汗下過當與先後失序而致表裡俱虛也如下後發汗小便不利是幸不至變壞者也此等雖經逆治能無他變者其人胃氣本強也下後發汗振寒脈微細及乾薑附子證俱是既屬少陰故不列於斯如汗吐下後自愈者亦不甚虛且邪既清解所以勿藥也汪氏曰此亦是當汗而汗當吐下而吐下故有陰陽和而自愈之日非誤用汗吐下藥者所能比也軒村曰此條與辨脈法相發云病有不戰不汗出而解者何也答曰其脈自微此以曾經發汗若吐若下若亡血以內無津液此陰陽自和必自愈故不戰不汗出而解也是也且下條亦云亡津液則亡血是諸失血之謂而亡津液總汗吐下亡血之詞亦通有汗下失度胸中陽虛者何如桂枝去芍藥湯證因誤下胸虛邪氣乘入以為胸滿故去芍藥然表邪猶在故用桂散表亦扶其陽虛稍甚者加附子救之脈促者以邪著在高乎金匱氣分心下堅大如盤邊如旋杯水飲所作桂枝去芍藥加麻黃細辛附子湯主之又千金桂枝去芍藥加皂莢湯治肺痿吐涎沫並與本方同趣蓋芍藥腹滿用之而胸滿忌之者以其味酸澀泥膈乎尤氏曰去芍藥者恐酸寒氣味足以留胸中之邪且奪桂枝之性也近是微惡寒千金翼亦脫惡字考此證上篇末條中亦有之乃似陽虛之驗然未審何故金鑑曰當是汗出微惡寒若無汗出二字乃表未解無取乎附子也此説不必如桂枝甘草湯證是過汗胸虛然其邪既解虛亦為輕故治宜小方而師試令咳條其病加重者也成氏曰發汗多亡陽胸中陽氣不足者病人手叉自冒心師見外證知陽氣不足也又試令咳而不即咳者耳聾也知陽氣虛明矣耳聾者陽氣虛精氣不得上通於耳故也按靈樞決氣篇曰精脫者耳聾有誤下中虛者何如桂枝人參湯證是也此數下胃虛邪氣內陷協熱下利故治取雙救蓋殆欲屬陰者矣脈沉滑者協熱利及陽明篇協熱便膿血並似言裡熱與此條異義傷寒例內虛熱入協熱遂利亦然此方桂獨後煮猶是附子瀉心湯附子後內之意與他桂枝諸方其例自異徐大椿説為勝有誤下下脫者何如赤石脂禹餘糧湯證是也此二三下之下焦不約以為瀉利故治取收澀桃花湯之類證也程氏曰下脫上結理中反成堵截上下二焦無由交通所以利益甚錢氏曰謂之益甚者言藥不中病不能止而益甚非理中有所妨害而使之益甚也按錢説似優要之此條設法御病就變示例言誤下之後下利不止者有冷熱不調宜用瀉心者又有胃氣虛寒宜用理中者又有下焦滑脫宜用收澀者又有泌別不職宜用滲利者證有數等不可一概也此方分溫三服本草圖經引作分再服似是有大邪已解胃虛生寒者何如厚朴生薑半夏甘草人參湯證汗後胃寒虛氣壅滯者也此證不必有停飲其用半夏蓋猶茯苓四逆用茯苓之意如千金大半夏湯之類溫泄寒脹諸劑皆自此方脫胎雞峰普濟方殿中丞郭中妹十歲病腹色不變按之而大不陷心腹下痞滿得之因取轉數多病已月餘北按甲乙經云三焦脹者氣滿於皮膚中殼然不堅遂與仲景厚朴生薑半夏甘草人參湯小其服凡經二十日脹消而已如病人脈數而反吐證汗多胃虛氣逆者也如病人有寒發汗吐蛔證宿寒為陽虛而加者也此證難必言邪解姑列於斯蓋素有寒人偶得外感宜用桂枝人參湯及桂枝湯加乾薑之陰旦湯之類玉函辨發汗吐下後病中有一條曰發汗後身熱又重發其汗胸中虛冷必反吐也千金翼同胸中作胃中疑是經文之遺也如差後理中丸證亦胃虛寒者也薑後諸證詳開於後然以情機相似斯舉其概下仿此蓋此諸證尤與太陰少陰相近似焉有大邪已解胃虛生熱者何如太陽中篇誤吐兩證俱胃中液燥虛而生熱者也錢氏以腹中飢口不能食及不喜糜粥欲食冷食等為胃冷所致恐不然朝食暮吐即暮食朝吐之互詞成氏曰晨食入胃胃虛不能克化即知至暮胃氣近里與邪氣相搏則胃氣反逆似拘此證蓋橘皮竹茹湯或千金竹葉湯之類所宜取用如單從驅飲恐不相對如差後竹葉石膏湯證病後胃液不復虛熱上逆者也此種證狀誤汗誤下後並多有見愚著廣要中詳之宜檢熱鬱熱鬱者邪熱入里不與物相者唯郁著各位者是也其證不一有表未解膈有熱者有表既解熱灼膈間者有心下熱結者有腸中熱壅得皆是少陽之類變爾蓋熱偏在一處故不耐白虎之大寒且其無所得亦非吐下所適是以制苦寒之劑而為之治矣更有上熱下冷輕證並隸於斯有表未解膈有熱者何如葛根黃芩黃連湯證是也此表未解故汗出熱犯上焦故喘言喘而汗出其汗似為喘而出然推其病恐不然且熱勢並及經下之胃故利遂不止所以不用桂者恐礙裡熱也此方移治滯下有表證而未要攻下者甚效內臺方議曰又能治嗜酒之人熱喘者又千金治夏月傷寒四肢煩疼發熱其人喜煩嘔逆劇切禍祟寒熱相搏故令喜煩七物黃連湯於本方加茯苓芍藥小麥聖濟治胃實熱煩渴吐逆葛根湯於本方去黃芩加半夏生薑竹茹有表既解熱灼膈間者何如梔子豉湯證是也太陽病誤汗吐下邪氣乘入或陽明病下早熱迸於上俱能致之蓋不比結胸之邪藉物實啻是邪熱熏灼上焦者耳其為證也曰虛煩不得眠此其輕者也虛煩之虛恐非陽虛之義蓋是心腹無實結之謂即對結胸及胃實之硬滿而言厥陰篇下利後更煩按之心下濡者為虛煩也條柯氏注甚晰此證郁灼猶輕故未至懊憹也曰反覆顛倒心中懊憹此其重者也張錫駒曰即不得眠之甚而為之輾轉反側也按心中懊憹為梔豉正證陽明及結胸並亦有之然別有真的曰胸中窒此其鬱稍甚者也徐大椿曰煩熱且窒較前虛煩等象為稍實按上條言發汗吐下後此條言汗下不言吐想吐最虛胸故吐後邪陷則不至此郁甚乎否則承上而省文也煩熱即虛煩不得眠之互詞考煩本熱悶之義故三陽皆有煩者又假為苦惱難忍之貌如疼煩煩疼之煩是已如少陰厥陰之煩亦是也成氏誤以煩熱為表熱以煩疼為熱疼至閔氏明理論刪補則引蛔厥之煩以駁成氏曰煩者不能安靜之狀較躁則稍輕焉可兼寒熱而論云云其説頗辨然猶未為當曰心中結痛此其鬱最甚者也徐大椿曰結痛更甚於窒矣按此以大下邪激聚胸故為結痛其不言汗吐者以吐最虛胸發汗亦有外疏之意故不至此郁甚乎否則亦是省文者也又此證最疑於結胸唯心下硬濡為分蓋輕重雖不同而情機則無異故均主梔子豉湯以涼解之矣此方為涼解胸中鬱熱之正劑梔子苦寒能清熱毒與芩連相近而服之必戀膈是以清上之功最其所長故以為君後人用治胸脾亦此意也香豉本草稱味苦寒無毒又殺六畜胎子諸毒金匱治中毒多用此者並足以見其亦為清涼之品況其臭烈況膈殊甚故住梔子之力久留胸中是以二味相得而能為對證之方矣本草豉條陶隱居曰好者出襄陽錢塘香美而濃然古者臭香互稱香豉之香恐非芳香之謂也按以臭為香訓義反覆用之見郭璞方言注抑本湯之非吐藥既有詳辨且吐本湧實今此證無物相得實何用吐為是其理最彰著矣崔氏黃連解毒湯為清膈之神方實自梔子豉湯變來者也其煩熱身熱不去及其外有熱手足溫等並內熱外熏之候非表未解也此諸證成氏注為妥宜參注家或以為表未解又以發汗有用豉者遂以上方為兼微汗恐不然至其有兼者如梔子甘草豉湯證是胃氣不足故少氣也如梔子生薑豉湯證是熱迫其飲故嘔也此與小柴胡之嘔相似如梔子厚朴湯證是下後兼胃氣壅滯以為中滿者也此方不用豉者豈畏其泥戀助壅乎如梔子乾薑湯證是丸藥大下兼中焦生寒者也此條文略姑就方意考之當是他有胃寒證候要邪本不劇故被誤治不至大逆故煩既微而胃寒亦輕是以僅須梔子乾薑而足矣王氏以丸藥為神丹甘遂當考此二證即系虛實之分矣如枳實梔子湯證蓋梔子厚朴湯之一類也有心下熱結者何如大黃黃連瀉心湯證是也此邪熱乘誤下之勢入而著心下以為痞者唯其無飲故按之濡然鬱結稍重故芩連之涼兼以大黃而麻沸湯泡用蓋意在疏泄而不在峻利矣脈浮而緊而復下之緊反入里則作痞按之自濡但氣痞耳蓋言此證痞證因飲結者必云痞硬此並云濡以為其別且氣痞也之稱似言但是熱結而非飲結方氏以本方證次彼條後曰此申上條言脈以出其治脈見關上者以痞在心下也以氧痞而濡所以浮也然痞之濡由熱聚也故用黃連清之於上聚雖氣也痞則固矣故用大黃傾之於下此説稍允又成氏曰以麻沸湯漬服者取其氣薄而泄虛熱尤氏曰成氏所謂虛熱者對燥屎而言也非陰虛陽虛之謂蓋熱邪入里與糟粕相結則為實熱不與糟粕相結即為虛熱本方以大黃黃連為劑而不用枳朴芒硝者蓋以泄熱非以蕩實也周氏曰以麻沸湯漬之其氣味之出輕而且活以大力之體為輕清之用非聖人其孰能之二説亦似是錢氏辨承氣陷胸十棗及此湯之異當並考如附子瀉心湯證是前證而兼表陽虛者其病表裡異情故治亦涼溫並行焉此條錢氏以命門虛為説近鑿尤氏曰此即上條而引其説謂心下痞按之濡關脈浮者當與大黃黃連瀉心湯瀉心下之虛熱若其人復惡寒而汗出證兼陽虛不足者又須加附子以復表陽之氣乃寒熱並用邪正兼治之法也又曰此證邪熱有餘而正陽不足設治邪而遺正則惡寒益甚或補陽而遺熱則痞滿愈增此方寒熱補瀉並投互治誠不得已之苦心然使無法以制之鮮不混而無功矣方以麻沸湯漬寒藥別煮附子取汁合和與服則寒熱異其氣生熟異其性藥雖同行而功則各奏乃先聖之妙用也此解甚覺精暢又大黃附子湯寒熱融和自為溫利宜分別看中西惟忠曰此方煮附子不言水率疑是脫文有腸間熱壅者何如白頭翁湯證是也此熱壅下迫故為下重蓋與腸澼同局者矣先兄曰白頭翁湯治熱利下重意在於清下焦之熱緩其窘迫仍以白頭翁涼腸熱為君秦皮亦清熱利竅俱合之黃連檗皮清利以瀉之蓋熱毒之氣客於下焦欲便不能重滯以迫於後竅故其方非治下焦腸滑之比而注家執苦以堅之之語可謂昧矣有上熱下冷輕證者何蓋上熱下冷實厥陰之機然更有未至其甚猶屬少陽之類變者此所列是已如梔子乾薑湯證是自誤下而變者也説見於上如黃連湯證是從素有之寒熱而膈胃異病者也此方自半夏瀉心變來然彼冷熱在一位而相結此冷熱異其位故彼則要藥性溫涼混和所以再煎此則要溫涼各別立功所以淡煮而不再煎尤氏曰此蓋痞證之屬多從寒藥傷中後得之本文雖不言及而其為誤治後證可知故其藥亦與瀉心相似而多桂枝耳此説非是此方愚常用治霍亂吐瀉腹痛應效如神蓋以其逐邪安正能和陰陽也飲邪搏聚飲邪搏聚者水飲蓄聚與邪相搏是也大抵其人有宿水或因邪而發動或以誤而勢長更有得病新成者其停瀦多在心下胃脘之分然泛漫上下不凝結一處其類凡四有犯上焦者有壅中焦者有屬表分者有兼陽虛者就中節目亦多雲有犯上焦者何如小青龍湯證是表實而宿飲被邪鼓激以犯其肺者也柯氏曰水氣畜於心下尚未固結故有或然之證若誤下則硬滿而成結胸矣徐大椿於小柴胡加減法辨五味子乾薑同用之理考吳綬既有其説並似未核又半夏湯洗令滑盡陶氏有詳説曰不爾戟人咽喉又曰凡方云半夏一升者洗畢稱五兩為正醫心方引蘇敬云半夏一升以八兩為正小島尚質曰以藥升平之半夏一升當今二錢三分一釐四絲五兩當今一錢七分六釐陶説似優如喘家及桂枝加厚朴杏子湯證是表虛而飲邪相得者也俱系太陽病有所兼者矣如麻黃湯大青龍湯及葛根芩連湯其喘俱為脈證邪散而喘定故不在此例如麻黃杏仁甘草石膏湯證是表既解而飲熱迫肺者也成氏以此條與葛根芩連湯相對為邪氣外甚非是蓋此汗出殆裡熱外熏所致耳且考其方意與小青龍加石膏越婢加半夏厚朴麻黃等湯實系一轍則知是飲熱相薄之證矣注家止為肺熱者亦未是也蓋麻黃與石膏同用則相藉開疏水壅也方後本云黃耳杯汪説難信或曰此傳寫有訛脫當是本云麻黃湯今去桂枝加石膏如發汗後飲灌而喘是新水所致也汪氏又主麻黃湯亦不確有壅中焦者何此證之水多自宿昔而有太陽所兼者有裡熱所挾者有表裡無熱者太陽所兼更有差別如桂枝加茯苓朮湯今削去桂及白字茯苓甘草湯二證是表有邪里有水然兩者不相搏唯飲為邪所動者而加苓朮證為重苓甘證為輕此二證俱無煩渴即里無熱之徵其輕重則玩本文自知加苓朮條無汗證明理論以為水飲不行津液內滲之候如五苓散證是表有邪而熱更入里與水相得或為下滯或為上逆故外有太陽脈證內有煩渴小便不利及水入則吐等候然里重而表輕故治專利水而旁發其汗脈浮微熱消渴與脈浮數煩渴及水逆自有輕重然其機相同故其治則一或曰五苓散之證之方亦猶金匱隨其所得而攻之之義柯氏金鑑注意似然但未了又先兄曰澤瀉行水與茯苓豬芩相類然五苓散用術與二苓各十八銖特至澤瀉多一十二銖者何蓋其質輕清性味俱轉故多用之二苓藉其力更能行水此説確當又嶺南衛生方曰五苓散用桂正如小柴胡用人參大承氣湯用厚朴備急丸用乾薑之類欲其剛柔相濟亦存攻守之意也故方書謂五苓散無桂及隔年者俱不可用近者鋪家有去桂五苓散不知者為其所誤如去桂而入參卻謂之春澤湯治燥渴有效此説非也但本方移治雜病則桂之用在溫散而能助滲利之力矣陶隱居曰方寸匕者作匕正方一寸抄散取不落為度按據中平三年慮傂銅尺漢一寸當今七分六釐又先友狩谷望之曰白飲即煮米泔也齊民要術煮𥺥條云折米白煮取汁為白飲此可以證裡熱所挾者如豬苓湯證是也此邪氣入里與飲相併以為哄熱故滲利之品兼以涼潤且其水並停下焦不特中焦蓋是陽明之類證以其有水不為胃實也金匱曰諸病在藏欲攻之當隨其所得而攻之如渴者與豬苓湯余皆放此尤氏曰無形之邪入結於藏必有所據水血痰食皆邪藪也如渴者水與熱得而熱結在水故與豬苓湯利其水而熱亦除若有食者食與熱得而熱結在食則宜承氣湯下其食而熱亦去若無所得則無形之邪豈攻法所能去哉此解極竅仍更表之又成氏注陽明篇本方條曰此下後客熱客於下焦者也邪氣自表入里客於下焦三焦俱帶熱也云云蓋此證之水並停中下二焦成氏之言不為不當若在後世注家專以為下焦之藥然如渴心煩不得眠等皆熱在中焦而上熏之候則其説難從表裡無熱者如發汗後水藥不得入口及厥陰茯苓甘草湯證是也茯苓甘草湯一方二用此桂但取溫散猶雜病五苓散之意又太陽中篇末條證與此似同然冒以太陽病似不必表裡無熱者有屬表分者何如文蛤散證是冷水潠灌水邪郁表故主以驅散之劑此條從柯氏作文蛤湯證方始對且金匱渴欲得水而貪飲者豈發散所宜一味文蛤自似切當蓋其方互錯也如牡蠣澤瀉散證是水氣外溢其病在下故治從內並得病後新成者也有兼陽虛者何此其人素虛飲停今因誤治陽更虛而飲亦動其證輕重不同如茯苓桂枝甘草大棗湯證其病輕而飲停下焦者也此方多用桂者以泄奔豚氣也甘爛水要取不助水勢靈樞半夏湯以流水千里以外者八升揚之萬遍取其清五升煮之其揆一也如茯苓桂枝術甘草湯證其病重而飲停中焦者也方氏曰心下逆滿伏飲上溢搏實於膈也氣上衝胸寒邪上湧挾飲為逆也動經傷動經脈振振奮動也蓋人之經脈賴津液以滋養飲之為物津液類也靜則為養動則為病宜制勝之云云尤氏曰此傷寒邪解而飲發之證飲停於中則滿逆於上則氣衝而頭眩入於經則身振振而動搖金匱云膈間支飲其人喘滿心下痞堅其脈沉緊又云心下有痰飲胸脅支滿目眩又云其人振振身瞤劇必有伏飲是也發汗則動經者無邪可發而反動其經氣故與茯苓白朮以蠲飲氣桂枝甘草以生陽氣所謂病痰飲者當以溫藥和之也愚謂此條止脈沉緊即此湯所主是若吐若下胃虛飲動致之倘更發汗傷其表陽則變為動經而身振振搖是與身瞤動振振欲劈地相同即真武所主也蓋此當為兩截看稍與倒裝法類似又錢氏注傷寒本當以麻黃汗解云云然此證誤汗之變遽至動經則其本為桂枝證亦未可知蓋傷寒二字不須拘執又其方專取利水以健胃與甘棗湯有小異金鑑以中焦下焦為辨其説為協如太陽篇真武湯證其病最重而與術甘證其機相近者也此條唯尤氏以為兼水飲然其説迂而不切愚謂此證虛陽外越故發熱陽虛飲動故心下悸飲阻清陽故頭眩經脈衰弱為飲被動故身瞤動振振欲劈地其用此方者以扶陽利水也此身瞤動與大青龍變肉瞤殆異矣如傷寒吐下後發汗虛煩脈甚微久而成痿亦是術甘湯證而經日失治者也方氏曰此申苓桂朮甘湯而復言失於不治則致廢之意彼條脈沉緊以未發汗言也此條脈甚微以已發汗言也經脈動即動經之變文惕即振振搖也大抵兩相更互發明之詞久言既經八九日若猶不得解而更失於不治則津液內亡濕淫外漬必致兩足痿軟而不相及也尤氏曰心下痞硬脅下痛氣上衝咽喉眩冒者邪氣搏飲內聚而上逆也內聚者不能四布上逆者無以逮下夫經脈者資血液以為用者也汗吐下後血液所存幾何而復搏結為飲不能布散諸經今經脈既失浸潤於前又不能長養於後必將筋膜乾急而攣或樞折脛縱而不任地如內經所云脈痿筋痿之證也故曰久而成痿兩説並覺詳密蓋虛煩是陽虛所致與建中之煩相近而與梔豉之虛煩不同按苓桂二湯證注家多單為陽虛輯義援金匱以確其為淡飲今又以真武證為同一情機特似牽湊然反覆申熟理不得不然也飲邪並結飲邪並結者水飲與邪相併頑結是也亦是素有澼飲或因誤治而並或不因誤而並其結在胸中者有結胸有藏結有胸有寒在心下者有熱實有冷熱不調要皆凝固一處者也飲在胸膈者多是稠涎在心下者多是稀水治有緊慢亦未可不由此也結胸者何飲邪相結以盤踞胸堂遂及心下是也明理論曰所謂結者若繫結之結不能分解者也蓋陽明病之類變而其證更有等差如大陷胸湯所主膈內拒痛心中懊憹心下因硬者其正證也拈膈痛者僅一條然既名結胸則其義自寓焉其來多因太陽病誤下病發於陽而反下之熱入因作結胸及大陷胸湯條其義可見已但此所謂陰陽殊為難解張氏既疑之秦氏傷寒大白以為表熱之輕重亦未鬯軒村嘗謂此蓋虛實已當時不詳其説今推之意蓋言就太陽中分其人虛實其人實有飲邪激甚故作結胸其人虛有飲邪激微故作痞所釋如是亦頗覺穩貼金鑑以數則為虛句為剩文愚謂當並動則為痛句從刪動數之動宜泛講蓋與脈數急者為傳也之急字一例亦有不因誤下者心下痛按之石硬其證稍重傷寒十餘日熱結在裡條亦是也其揭大柴胡者以彼證亦有心下急痞硬等與結胸相疑故對待為辨往來寒熱與無大熱相對熱結在裡與水結在胸脅相對但頭汗出是柴胡證所無且舉水結字以明結胸之必自水飲有自重汗復下者從心下至少腹硬滿而痛不可近此兼胃實其證最重以上輕重如其來路當互意看不必拘有自少陽病誤治者半夏瀉心湯條不特為二證立辨亦示少陽誤下猶有為結胸及痞者又結胸有自太少並病者然似非大陷胸所主蓋輕重來路俱雖有異其情則一故均用此方以驅除水熱也成氏謂利藥中此為駃劑信然蓋利藥欲生大承氣主在大黃故後煮之此湯重在甘遂故先煮大黃後內甘遂非彼急而此緩也尤氏有承氣陷胸辨其説新奇不確仍不採入如大陷胸丸證是其並結稍輕於前證然勢連甚於上者也項強殊甚其狀似痙但非如剛痙之背反張故云如柔痙狀喻氏曰胸邪緊逼以大陷胸湯下之恐過而不留即以大陷胸丸下之又恐滯而不行故煮而連滓服之然後與邪相當而可施戰勝攻取之略觀方中用大黃芒硝甘遂可謂峻矣乃更加葶藶杏仁以射肺邪而上行其急煮時又倍加白蜜以留戀而潤導之而下行其緩必識此意始得用方之妙按陶氏曰一方寸匕散蜜和得如梧子準十丸為度如彈丸及雞子黃者以十梧子準之唐本注云方寸匕散為丸如梧子得十六丸如彈丸一枚若雞子黃者準四十丸今彈丸同雞子黃此甚不同據此彈丸大正準十六梧子吳氏説實沿李時珍之陋耳又丸字宋代避諱作圓字非有異趣詳開於愚著藥治通義中茲不贅如小結胸是病不及膈屬最輕證故不假攻下然亦是並結所以猶須陷胸之法也程氏曰痞證亦有心下硬者但不痛耳如寒實結胸蓋系太陰之類變此膈間素有寒涎邪氣內陷相化為實或是有膈痛心下硬等證其勢連及於下而陽猶持者故峻利之也尤氏亦疑小陷胸湯及亦可服七字然猶誤接文蛤散條陶氏曰巴豆打破剝其皮刮去心不爾令人悶如本有寒分下之作結胸者亦是寒實然陽素虛故不宜利藥也成氏曰以心下結滿臥則氣壅而愈甚故不能臥而但欲起也據此則豈與支飲倚息同機者乎心下必結錢氏以為梔豉類證愚謂此太陽病兼心下有水者殆桂枝加茯苓朮湯之類證也其誤下作結胸須增損理中丸即胸痹用人參湯之意也藏結者何陰寒上結如結胸狀是也汪氏以挾食無食辨結胸藏結亦未允尤氏曰胸高而藏下胸陽而藏陰病狀雖同而所處之位則不同是襲汪氏之謬又汪氏謂藏結按之不痛尤氏則以為如結胸狀者謂如結胸之按而痛近是此亦太陰之類變乃與寒實結胸相似而有異蓋深痼沉著宗氣亦衰故不任攻下要錯惡最極者也此證僅二條難精其義然既名藏結則其病深重可知且以理推之寒實結胸有痰涎相得藏結則似無痰涎唯是寒結勢逼君主者乎然無明徵姑列於此舌上白胎滑者舌上胎滑者就二者字視之則似藏結有胎不白滑而黃澀者又似有有陽證往來寒熱其人躁者寒凝豈有此等證狀然則二者字當虛講曰難治曰不可攻並謂藏結之難治不可攻不特為舌上白胎滑而言也吳氏削飲食如故時時下利八字蓋飲食如故一句難解俟考太陰病下之而胸下結硬與此相近金匱曰病者萎黃燥而不渴胸中寒實而利不已者死亦類證已如病脅下素有痞是其位稍殊而寒凝則一故同其稱矣有胸有寒者何如瓜蒂散證是也此亦膈中頑涎與邪相實蓋不自誤下者故病勢甚於上以為寸脈微浮微浮以驗病位曰弦遲曰乍緊曰乍結並徵其實胸中痞硬此病人自覺之情氣衝喉咽等候而不及心下亦不痛厥陰篇心下滿當作心中滿為是及其閉甚陽氣阻格以致厥逆即是邪高結甚不得不因而越之此方之所由設也瓜蒂至苦其能在味吐藥之最峻者也豆之腥臭令人噁心豉之腐臭必泥胸膈俱資助上湧之勢王氏選注之言蓋為當矣吐之一法與汗下鼎峙誠為緊要然本是非六病之正對且宜吐證在本經特三條金匱亦不過瘧黃宿食數者可見其證極少非汗下之所比也有結在心下而熱實者何如十棗湯證是也亦系陽明之類變其病連脅下而水與邪其勢俱猛自非此駃峻豈能直折之者乎尤氏曰金匱云飲後水流在脅下咳吐引痛謂之懸飲又云病懸飲者十棗湯主之此心下痞硬滿引脅下痛所以知其為懸飲也方氏曰此蓋邪熱伏飲搏滿胸脅與結胸雖涉近似與胃實則大不相同喻氏曰此證與結胸頗同但結胸者邪結於胸其位高此在心下及脅其位卑愚謂結胸與瓜蒂散及此證相似不同臨病之際宜精認體察也按千金錢匕之説本於陶隱居肘後百一方序平旦服諸家無解蓋陰氣未動飲食未進之時藥力易以潰結也本草經曰病在四肢血脈者宜空腹而在旦陶隱居曰毒利藥皆須空腹孫真人曰凡服利湯欲得侵早並宜參商千金干棗湯治腫及支滿澼飲於本方加大黃黃芩甘草蕘花水煮本草圖經曰胡洽治水腫及支飲澼飲加大黃甘草並前五物各一兩棗十枚同煮如法一方又加芒硝湯成下之聖惠治婦人血分四肢浮腫心腹氣滯不思飲食芫花丸於本方加大黃青橘皮細銼以米醋一中盞旋灑藥於銚子內慢火炒令醋盡為末麵糊丸如梧子大食前以溫酒下七丸有結在心下而冷熱不調者何此其人胃氣素弱水液不行而誤治更虛胃冷熱搏以為痞硬者是也大抵胃素寒者邪陷必化為寒今胃雖弱其寒未甚故猶為此證喻氏解病發於陰而反下之因作痞曰是熱人省文以見意也此與錢氏不同而反似允愜所以成結胸者一句亦似略成痞字而言經中間有此例錢注恐鑿又其云作痞者只指飲邪並結之痞不是該言氣痞錢氏以為三瀉心證者是蓋虛實相半汪氏有濕熱不調虛實相半語故病勢頗緩實系少陽之類變如其治法溫涼並行以調停之但其證有別如半夏瀉心湯證是飲盛者也如生薑瀉心湯證是寒勝者也如甘草瀉心湯證是虛勝者也瀉心湯者非瀉心火之熱瀉心下之痞也此本云岐子説又明理論曰氣結而不散壅而不通為結胸陷胸湯為直達之劑塞而不通否而不分為痞瀉心湯為分解之劑所以謂之瀉心者謂瀉心下之邪也痞與結胸有高下焉云云愚考諸注似半夏證特熱並而生薑甘草二證熱既除然所以成痞者恐不可不因邪熱加之曰傷寒汗出解之後胃中不和不過言大邪既解曰此非熱結但以胃氣虛客氣上逆亦是對結胸及大黃黃連證而言非必無些熱觀心煩不得安而可見也如移治雜病痞硬則芩連與參薑俱行其苦唯存瀉痞之用不嫌其清涼也甘草瀉心條曰穀不化金匱水氣篇曰小便不利水穀不化面目手足浮腫即同義也更有二證相類其一如柴胡桂枝幹薑湯證是也此病涉太少而兼飲結亦冷熱並有者也此條諸注為津乏解然今驗治飲甚效因考曰微結曰小便不利曰渴俱似水氣之徵不嘔者以水在胸脅而不犯胃之故但頭汗出亦邪氣上壅之候蓋乾薑溫散寒飲牡蠣栝蔞根並逐水飲牡蠣澤瀉散亦有此二味其理一也先兄亦嘗言之仍再揭於此或曰微結字無著落蓋心下微結之省文也其一如旋覆代赭湯證是也此邪既解而胃弱飲逆者也血熱瘀血血熱者邪熱內並以迫血分是也蓋熱之迫血或血失故道擾動外溢或熱氣燔灼血液內爍矣其外溢者有自衄而愈有用麻黃湯衄而解此條目瞑蓋目眩之義瞑眩古相通用魏氏曰以陽藥治陽邪所以能致陽氣重劇而作衄也有衄而猶用麻黃尤氏曰必欲衄而血不流雖衄而熱不解者乃為合法不然靡有不竭其陰者皆是屬表者也鼻衄固表郁之一證不宜隸之兼變中今以其亦系血熱故因敘於此以備後段諸證之參照有熱壅上焦而吐膿血有熱迫下焦血下而愈有裡熱而衄周氏曰邪入血分熱甚於經故欲漱水未入於府故不欲咽按陽明篇衄二條與少陰篇便血條聖惠方並擬黃芩湯有熱陷入里及陰變陽而便血如便膿血此諸證不下數條而皆無其方前注所擬或不能確臨處之際更須精思焉皆是屬裡者也更有淋家誤汗而便血有火逆而衄如吐血如清血有少陰誤汗而血自口鼻出亦並屬裡者也其內鑠者有衄家誤汗以增煎熬有素虛誤灸血散脈中黃氏曰宜助陰生血徹火熱炙甘草湯小柴胡加栝樓實湯按後方可疑有厥陰誤汗口傷爛赤及熱氣有餘發癰膿皆是營血受傷者也近今傷寒最多血分熱灼者大抵自素稟陽臟加以液虧或發汗過多迫脅血脈而其證治與膈熱出入必要清潤是在深求經旨而變通之矣瘀血者血失常度瘀畜下焦是也説文曰瘀積血也從疒於聲然瘀血之瘀與瘀熱之瘀恐同其義蓋仲景書或有難從説文者如痞痛也之類蓋邪熱壅鬱血中則相搏為瘀唯其瘀也血即水類故必就下以結少腹焉其證有結日淺而病勢劇者有結日深而病勢慢者治之之法隨而有別矣結日淺而病勢劇者桃核承氣湯證是也此蓋從失汗邪氣內並所致其結未緊故熱未斂而勢殊劇所以此方亟逐利之也膀胱猶言下焦蓋與胃中有燥屎同例不必深講抵當湯條曰熱在下焦義互相發程氏曰此條不及小便者以有血自下三字也然小腹急結處包有小便自利句愚謂此證血結而非氣滯是所以不用枳朴之破氣而有取於芒硝甘草軟堅緩急也結日深而病勢慢者抵當湯丸證是也大抵亦自失汗而其結既緊其熱既斂故勢殆慢所以專破潰之但更有輕重是以有湯丸之分矣六七日表證仍在者蓋以發汗不徹之故耳表證仍在一句內蘊有其外不解者尚未可攻之義宜與桃核承氣條互看脈微而沉微所謂沉滯不起之狀非微弱之微楊士瀛曰挾血者脈來乍澀乍數閃灼明滅或沉細而隱伏是也反不結胸義未瑩徐氏曰表邪在脈宜浮而沉脈沉胸宜結而反不結證極可疑乃少腹硬滿小便自利而人反發狂然後知上焦之表證脈相反程氏曰微沉者結胸脈也脈沉而不結胸知邪已入深而直結於下焦血分矣二説稍通姑存之如狂之解柯氏為是此如字與舌上如苔之如字同語例桃核之血多結於得病之後抵當之血多結於得病之先山田正珍曰桃核承氣治邪結下焦而血為之不行滯而為瘀者抵當湯丸治素有瘀血而熱邪乘之者陽明篇抵當湯條云本有久瘀血可以見焉徐大椿曰桃核承氣乃治瘀血將結之時抵當乃治瘀血已結之後也按徐説未切然未可一例而論也張兼善曰或云桃核承氣及抵當湯證俱系下焦畜血中間雖有輕重未審緣何而致此也此皆發汗未得其宜或當汗不汗或汗遲或脈盛汗微或覆蓋不周而不汗其太陽之邪無從而出故隨經入府結於膀胱按抵當湯條既有表證仍在語而失汗蓄血脈經及陳延之芍藥地黃湯主療既言之巢氏諸家亦屢有其説且驗之病者益知張氏之言不誣矣要之病雖在下均是屬實乃陽明病之類變也陽明篇病人無表裡證條明理論有詳説宜參熱入血室熱入血室者婦人月事與邪相適熱乘子戶是也有自適來者有自適斷者曰婦人中風曰婦人傷寒俱是互文見意也適來者得病之際月事方來者也婦人傷寒發熱是省惡寒字經水適來下蘊得之七八日字適斷者未得病前月事已來而得病方斷者也經水適斷四字當在七八日之上倘七八日之後適斷者則其來必在得病之初是與適來何別志聰説恐未當唯文勢有體不要錯易適來血不結適斷則結程氏方氏説可見也治之之法適來則曰刺期門曰無犯胃氣及上二焦而不示方藥然除小柴胡他無相當也龐氏刪及二焦三字曰先宜小柴胡湯可愈可刺期門可愈當不愈郭氏曰常氏云隨其實而瀉謂針家當行瀉法也亦可用小柴胡湯又曰上焦中焦營衛所出也如不自愈者服小柴胡湯許氏本事方有治適來證用小柴胡加地黃湯治驗陳氏婦人良方曰無犯胃氣者言不可下也小柴胡湯主之若行湯遲則熱入胃令津燥中焦上焦不榮成血結胸狀須當針期門也並可以徵焉且傷寒發熱條汪氏曰此言汗吐下三法皆不可用也必也與小柴胡湯以和解邪熱斯不調其經而經血調讝語等證可不治而愈錢氏徐大椿説亦同為是蓋病至讝語如見鬼狀未有勿藥自愈者必自愈一句為無犯胃氣及上二焦而發也方氏以為紅汗之類恐不然又或曰二焦之二衍文也犯胃氣言下犯上焦言吐適斷則雖屬血結而不敢攻之者以僅是血道為邪澀滯非有瘀畜故小柴胡湯以清其熱則結自散也小柴胡解血熱楊士瀛説為當既拈於廣要中醫學讀書記亦曰血結亦能作寒熱柴胡亦能去血熱不獨和解之謂也要之此二證俱邪遏血而遂拒胸脅實少陽之類變也更有一證陽明病下血讝語者是也此胃實之熱迫血下奪血室隨空邪隨乘入者其機稍與前證異然亦恐柴胡所宜但胃實輕重所須加察焉風濕風濕者太陽病而兼濕邪是也風非中風之風蓋總括風寒之詞得病之初兩邪相合以濕性濡滯故數日之間猶淹留骨節而其衛虛其寒亦甚八九日三字當與風濕相搏句易位看傷寒五六日中風及婦人中風七八日云云經水適斷者俱同例也治宜溫發而證有輕重故設桂枝附子甘草附子二湯桂枝附子湯證舉不嘔不渴者蓋以既經數日人疑其邪陷然病猶在表故揭此二候以為里無邪之徵矣甘草附子湯證短氣前注為邪在胸膈者非是金匱歷節亦有此證俱是表被邪遏裡氣不暢所致也如里素有熱者有去桂加朮之法去桂加朮之義尤氏解稍妥與金匱注同故不拈出舒氏欲改大便堅為大便溏誤也蓋里有濕者大便滑泄小便不利此其常也今大便堅小便自利者知是濕唯在表而里素有熱因去桂不用然既無桂則殊少外散之能故易之以術方後曰附子術並走皮內則此方之術是為發表濕而不為燥脾明矣仲景之時術無蒼白之分未知其所用為何然在今世則二術隨宜為妙如此方及甘草附子湯並用蒼朮正見其效施氏績易簡方所辨甚精今拈於下曰夫去濕以術為主古方及本經止言術未嘗有蒼白之分自陶隱居言術有兩種後人以白者難得故貴而用之殊不知白朮肉厚而味甘甘入脾能緩而養氣凡養氣調中則相宜耳蒼朮肉薄而味辛烈辛烈走氣而發外凡於治風去濕則相宜耳又中西惟忠亦論此方之術取之發表文冗不録方後法當加桂以下五十二字金匱所無風濕之病不止是證其詳在雜病論中此唯存梗概耳再詳此二條證俱濕病之屬表虛寒者蓋與少陰直中其情相似而其機則不同濕熱寒濕濕熱者水濕內瘀熱氣熏蒸相郁發黃是也此猶陽明病唯有燥濕之分瘀熱唯於發黃及蓄血稱之錢説可信徐氏亦曰凡言瘀字有挾濕之義焉考瘀系淤字從疒説文曰淤澱滓濁泥從水於聲蓋其人州都不通內畜水濕而得病之後胃熱相釀以為重濁殆如淤泥之黏濘是所以郁甚成黃故以茵陳蒿湯逐除濕熱也茵陳蒿湯條其一不言腹滿不大便者省文也蓋茵陳為清熱中之燥藥故的解濕熱又此湯用後大便必利胃熱能散則濕自小便去故如皂角汁狀以濕即水類也水一斗二升煮至三升殊覺過濃二升二字無者為勝更有二證其一前證而未內實者單清涼之梔子檗皮湯證是也全嬰方論蘗皮湯治小兒衄血至一二勝悶絶即本方其一濕熱外迫者專發散之麻黃連軺赤小豆湯證是也先教諭弟子西仲潛曰此二條證方互錯瘀熱在裡理不宜發表必是梔檗湯證身黃髮熱即為表候殆即赤小豆湯證此前人所未言殊似有理云岐子以此三湯配三陽亦足互徵先友伊澤信恬曰連軺即連翹本草經所載之物而非其根也千金及翼並作連翹爾雅連異翹郭璞注一名連苕皆可取證且詩陳風邛有旨苕陸璣疏苕苕饒也幽州人謂之翹饒漢書禮樂志兼云招給祠南郊顏師古注招讀與翹同文選吳都賦翹關扛鼎李善注列子曰孔子徑能招國門之關而不肯以力聞據此翹苕軺實一聲也此説為核又金鑑曰無梓皮以茵陳代之愚意不如李中梓之以桑白皮代之寒濕者其人素胃寒有濕邪氣相郁為黃如谷疸及寒濕在裡證是也此太陰病之類變而寒亦發黃者猶是郁黷所致也此證後世名為陰黃韓祗和方説殊詳
