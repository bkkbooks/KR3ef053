body:
  text: 卷三述合病並病合病並病者表裡俱病是也方其感邪表裡同時受病者謂之合病表先受病次傳於裡而表邪猶在者謂之並病合病則劇並病則易此合併之略也此本於成氏諸家所論多失穿鑿徐大椿曰同起者為合病一經未罷一經又病者為並病亦為約當張介賓曰今時之病則皆合病並病耳可謂概論矣合病總有四證曰太陽陽明曰太陽少陽曰少陽陽明曰三陽是也太陽陽明者熱盛於表而勢迫及里裡氣擾動下奔則利上逆則嘔治發其表則里隨和矣此證蓋不胃實候見者其稱陽明唯是指裡氣擾動而言方氏曰不下利乃對必自下利而言兩相反之詞所以為彼此互相發明斯說似要又此病邪熱頗劇裡氣隨擾蓋自非表實不至如此是所以不用桂枝湯或下利或嘔氣機稍從內而泄是所以不用麻黃湯是以特有取於葛根乎汪氏曰成注裡氣虛即為不和不可作真虛看又曰成注云裡氣上逆而不下者但嘔而不下利愚以其人胸中必有停飲故也更有喘而胸滿者亦不過表實里壅也中西惟忠曰此雖邪實於胃先發其表然後下之者也存參太陽少陽者太陽為輕而少陽為重故治取清熱通壅蓋此證不敢用柴胡者以病勢下迫邪不必郁本位多用芍藥者亦取通壅也陽明少陽者少陽邪輕而陽明病重所以下利者猶是熱結傍流故治宜快藥考經文似不必主大承氣然明理論斷為其所對為當此三證者兩位之病不相均齊故施治責其所重也軒村曰疫毒痢證治不外於合病下利之機善廣其趣則不假他求而左右逢原此言誠發千古之秘蓋本病亦參疫痢之理則其義更昭矣唯合病必更有數證今大抵以下利為的愚未達其故且俟後考三陽合病者其證有二其一周身熱熾邪聚於陽明者為多故主以白虎陽明篇所揭是也其一邪聚於少陽者為多少陽篇所揭是也此說本於尤氏曰此條熱之聚於少陽者視太陽陽明較多矣設求治法豈白虎湯所能盡哉考錢氏主以白虎故尤有斯言愚意恐是小柴胡加石膏所宜也又風溫與此二證相似詳見彼條此他陽明中風口苦咽乾與陽明病脈浮而緊咽燥口苦證候恰合而實系三陽合病據其脈候則專於表者也陽明中風脈弦浮大亦是三陽合病而殆專於少陽者也此合病要領也素問所謂兩感即三陽合病已朱氏以太陽中篇四逆桂枝條附湊為說殊屬深誤故劉完素趙嗣真既有詳辨宜閱三陰病則其機雖各異而其位相同此所以無合病也龐氏曰三陽皆有合病惟三陰無合病此語為然而李梃醫學入門非之反謬矣並病僅有二證曰二陽曰太陽少陽是也二陽者太陽病發汗不徹邪氣進入陽明而表證仍在者矣治法先解其表表解已而攻其里此條竊有所考今陳於下曰此當作三截看蓋示二陽並病其等不同條首至如此可小發汗是一截此邪既屬裡而表僅存者故須小發汗設面色緣緣正赤三句是一截此表熱鬱甚故里氣益壅相併以為面赤陽明篇所謂面合赤色者即一類已然此他見證必有數端殆意寓言外也熏法陳稟丘張苗並謂連發汗不出用之是在汗法中最緊乃其病之重可見矣若發汗不徹至條末是一截此比前證稍輕不足言猶未至言與腹滿不減減不足言同義此三字當接下文為十字一句讀上文在表二字玉函作不得越以可互證但煩躁之狀似病稍重然乍在腹中乍在四肢恐未必煩憒躁擾之謂嘗療一人失汗表郁兼以胃實者胸腹攪刺走注不定正與此證吻合汪氏曰短氣者邪熱壅而氣促急也但坐者不得臥也汗出不徹營氣不得條達則脈澀條辨以澀脈為血虛解大誤此說是也此三等證強擬其方則小發以桂枝解之據程氏用大青龍發汗據龐氏以麻黃而可歟如陽明篇之桂枝麻黃二條及桂枝承氣條亦是此證其治則先表后里之法也太陽少陽者其二條俱用刺法而其一條為誤下結胸然如柴胡桂枝湯實其正方而柴胡桂枝幹薑湯其有所兼者也少陽與陽明並病則無見其稱然大柴胡湯為其對方而柴胡加芒硝湯其奇治也如陽明病發潮熱大便溏云云小柴胡湯證亦即是已此條是胃實而邪猶存少陽者其次條是少陽而似胃實者兩條對示乃與太陽中篇四逆條同例此並病要領也三陰無並病理同合病唯如太陽厥陰之桂枝四逆各施及太陰之桂枝證即是表熱裡寒相兼者殆並病之變局乎鄭端友全嬰方論論癇有半陰半陽合病即言寒熱相兼者按表裡兼證之治表熱裡寒則先里而後表何也先實里者恐脫候倐至邪亦從陷也里既實而從事於表亦不為遲設先救表則虛耗之陽隨汗益奪豈望邪氣外散耶表熱裡實則先表而後里何也先攻表者恐表邪併入裡熱壅重也表既解而從事於里亦不為遲設先攻裡則胃空邪乘遂為壞病豈望邪氣內解耶此仲景之明律也六病正證之外有表裡證者如葛根芩連湯五苓散桂枝人參湯等證其類甚多然叵謂之並病仍不列於此述溫病風溫溫病者熱結在裡表裡俱熱證是也即陽明病之一證此病前注為內經溫病之義間有謂為白虎證者猶與彼強合特王氏柯氏以為傷寒中之一證惜辨徵不核今因演其說曰內經所謂溫病者冬傷於寒寒邪內伏得春溫而方發之謂也本經三陽三陰及中風傷寒等其名則取之素難而其證則自異豈特至溫病既取其名又並真證而取之乎況全經本不有從時分病之說則仲景所謂溫病為傷寒中之一證明矣且考素問瘧論以先熱後寒為溫瘧而仲景則以身無寒但熱為溫瘧以其有骨節疼煩故加桂枝於白虎湯中以清裡發表可見溫病之溫與溫瘧之溫均是熱盛之謂矣溫熱互稱猶冷與寒素問春必溫病靈樞論疾診尺篇作春必生癉熱太素作春乃病熱又評熱病論其首節說病溫陰陽交而倉公傳則曰熱病陰陽交者死又刺熱病有五十九穴而叔和則曰治溫病刺五十九穴許氏說文曰熱溫也並可以徵焉此條冒頭三字蓋揭示來路者曰渴曰不惡寒俱是表解而裡熱之候則發熱其初太陽翕翕之熱而今為陽明蒸蒸之熱然則與熱結在裡表裡俱熱有何差別愚故以為溫病即白虎證之稱謂也溫病條列之太陽者亦猶小柴胡之例然其非表證而敘在篇首者豈叔和據五十八難徒執其名以與中風傷寒相為排比者歟傷寒例第一節辨列傷寒溫病暑病等其意可知矣愚固不欲議撰次之得失特於此條則不能無疑也其來必自太陽如少陽其自少陽所謂服柴胡湯已渴者寓有其義大抵白虎證得之其人陽氣偶擾而邪氣乘入進熱殊急者今多見之經所云恐其機也然亦未能無因誤治而致者也而毒邪暴進直陷入里內灼外熏勢如燎原故其脈浮滑洪大吳醫匯講薛雪曰傷寒脈浮滑此表有熱里有寒表之熱寒之用里之寒熱之體言熱病本於寒寒既病而為熱矣則體用皆熱也漢之文法如此是說蓋本諸方氏又活人書改作表裡有熱而郭氏從之汪氏亦曰斯言乃為定論然未免臆見又黃氏據林氏更有詳論文繁不錄其證蒸蒸發熱自汗出心煩大渴白虎加人參湯及五苓散條所言煩渴者參自余諸條蓋煩而渴之謂成氏以為熱渴似不妥舌上乾燥欲飲冷水然不有燥屎搏結唯是胃家焦爍因立白虎湯以清涼之愚嘗謂此湯妙在粳米何也凡物不慣於胃者金石為最物慣於胃者莫如米穀今用極不慣者故配以極慣者使其不損中土如竹葉石膏湯桃花湯之粳米厚朴麻黃湯之小麥硝石礬石散之大麥粥汁皆是也詳義見拙著藥治通義第十卷又石膏一斤碎下當補綿裹二字厥陰篇方中有之陶隱居曰凡湯酒膏中用諸石皆細搗之如粟米亦可以葛布篩令調並以新綿別裹內中如其自太陽誤汗吐下而加液乏者加人參以滋養之或曰加人參湯證有二其一本方證而更液乏者其一液雖不乏其病稍輕不耐本方者佐人參以調停之未知是否又千金外臺加人參諸條一用本湯恐非是但白虎脈證略於本湯而反詳於加人參湯殆不無疑也太陽上篇加人參條汪氏曰此條當是太陽證罷轉屬陽明之證其不入陽明篇者以其服桂枝湯後之變證且與上條脈證相同但加煩渴用藥霄壤前賢著書欲使後學悉心體認設其失治則胃津枯竭遂不可救其變或為胃實而不敢為陰證也白虎承氣之別在實之有無則似不宜參為彼證然在今驗之往往有之況三陽合病既有腹滿讝語則其理可見也風溫者溫病之類證也據脈陰陽俱浮則似表有邪者其證與三陽合病相近治法亦恐白虎所宜也此條難解程氏注於文理為順然愚竊有疑何則表裡熱盛倘誤汗之必大傷律恐不更至陰陽俱浮也成氏以為傷寒發汗之後方知其風溫是似於病理為順今就其義別發一說此言太陽病發汗當解不解者不特表有邪而里既有熱其稱之風者猶風家風濕之風即表有邪之謂然則風溫為溫病之兼表者故一條中並論之然不啻汗後知之自有認得真的故下文先揭風溫為病一句而盡其證若被下若被火從程氏則是系溫病誤治從成氏則是系風溫誤治未審何是又成氏曰先曾被火為一逆若更以火熏之是再逆也蓋本於玉函程氏則以若火熏之謬為體如煙燻故以一逆再逆為汗下等之誤治又汪氏疑小便不利字然太陽中篇有欲小便不得反嘔欲失溲之文蓋同例也又此病謂與三陽合病相近者何也彼曰脈浮大上關上此曰脈陰陽俱浮彼曰若自汗出者又曰目合別汗此曰自汗出彼曰身重難以轉側此曰身重彼曰但欲眠唾此曰多眠睡鼻息必鼾彼曰口不仁此曰語言難出彼曰遺溺此被下曰失溲但彼兼胃實故有腹滿讝語其他則證證相合如此殆一病而異其名者耳義出蠡見姑錄俟識者總病論病人素傷於風至醫殺之耳本出玉函脈經不可發汗病中風溫之為病云云全取千金方但千金作溫風之病溫風二字蓋錯
