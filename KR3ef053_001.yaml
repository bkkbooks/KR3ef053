body:
  text: 卷一敘述傷寒論一部全是性命之書所以使學者見病知源是以深切而著明平易而直達誠匪有牽紐艱隱之故者也蓋仲景之旨先辨定其病辨病之法在察脈證故必就脈證以定其病而後治法有由設焉所謂病者何也三陽三陰是也熱為陽寒為陰而表裡虛實互有不同則六者之分於是立焉所謂脈者何也其位寸口關上尺中趺陽其體浮沉遲數緊緩滑澀之類是也證者何也發熱惡寒讝語腹滿下利厥冷之類是也脈有常變證有真假故脈證並示而病之情機盡焉脈有常變詳論於卷末答問中病情字素問多見如形之疾病莫知其情類情之言猶性蓋病之寒熱虛實皆謂之情也病機字見本草經曰欲療病先察其源先候病機蓋邪之進退消長勢之緩急劇易皆謂之機也程氏以病人之苦喜指為病情柯氏論翼又論病有名證情機之別並與此所稱異所謂治者何也汗下涼溫及刺灸之法是也六病之中自有緩急劇易之不等故方亦有大小緊慢之不同以相對治加之人不能無宿恙相得醫或誤措以致變逆者凡皆隨其脈證而備之治法其深切而著明平易而直達固既如是始非有艱隱難知者也雖然其書實三代之遺是以言高而旨邃苟不通其義例則未免乎盲者之擲埴索塗冥行而已矣盡嘗論之取之岐扁變而通之此名稱之例也自熱而寒自表而里自實而虛此篇第之例也六病各有提綱而次以細目又次以本病來路傳變證候及誤逆諸態疑似各病或舉其正而承以其奇或說其輕而續以其重有法有案有戒有論參互錯綜縷分條析此章次之例也語有主客辭有詳略或數條相參而其義始悉或一章之中文互照對證以方省方以證略有理趣明白不假復述者有事緒繁雜須人引伸者此辭句之例也四者之例極為謹嚴而俱是莫不深意所存矣今不憚弇陋本於輯義之著按諸四者之例推究病之情機以述其大要始陰陽總述終差後勞復脈證治法具為辨析顧猶未免注家更定之氣習然不分其派無由以達其源不疏其類無由以認其別故務去拘鑿之談敢從坦明之說庶通其可通疑其可疑專以擴充家庭之遺教闡揚性命上之神理矣後之讀者或由此入手其於臨病處療之方未必無小補云是書之作以辨全經大義為主故每病每證不必具列各章特舉其梗概以俟人隅反蓋敘大綱則用大書而其所以為說及援據諸說則夾注其下要旨不過於述輯義之餘意則輯義既載者亦不復録出如撰述之例更有三端一發輯義之覆輯義固主慎重故於情機傳變之委前人說不具者大抵缺而不論今鑽研經旨核核事理略加辨訂以為貂續一酌諸家之中輯義所引諸說或一條而異同兼臚或數條而前後異其義今則參互涵泳歸之於畫一一補輯義之遺前輩確說及諸家擴充經旨者或有漏落略取附之唯拙著別有傷寒廣要故彼之所採入茲不復贅要之仲景之書理無不該學者如飲河之鼠各充其量此輯義之著亦所以不厭廣搜今斯書則僅述一隅所見特隘然既博矣從而約之固亦為學之方覽者幸恕僭越之罪而可也按諸注家如尤怡傷寒論貫珠集黃元御傷寒懸解長沙藥解俱出於先教論下世之後尤書穩實間有發明黃書僻謬殊少可取又近世有熊壽試集注又郭雍傷寒補亡論輯義從汪氏轉引而近日有吳舶新齊本今亦採入至如皇國注家則指不暇僂輯義一概不引嫌蕪雜也愚亦甚厭讀姑取一二部略摘録之已郭氏曰問云傷寒何以謂之卒病雍云無是說也仲景敘論云為傷害雜病論合十六卷而標其目者誤書為卒病後學因之乃謂六七日生死人故謂之卒病此說非也古之傳書怠墮者因於字畫多省偏旁書字或合二字為一故書雜為亠從木或再省為卒今書卒病則雜病字也漢劉向校中祕書有以趙為肖以齊為立之說皆從省文而至於此與雜病之書卒病無以異今存傷寒論十卷雜病論亡矣郭此說甚是但末句有疑家丹州公醫心方引養生要集有高平王熙叔和曰語據此叔和名熙以字行也先友山本讓嘗有此說實為前人之所未言及仍附拈之陰陽總述蓋欲明仲景陰陽之義必先審素問熱論之旨三陽三陰之目所由出也夫三陽三陰之目雖取之於彼而其義則自有不同矣故學者胸次必先了然於此而始可讀仲景書耳考熱論黃帝以熱病起問而岐伯對以人之傷於寒也則為病熱是言人真傷於寒氣而陽氣怫結因為熱證也曰傷寒一日巨陽受之故頭項痛腰脊痛云云是據經絡為分以為三陽經循外三陰經循內故表熱證為三陽裡熱證為三陰而以表裡均熱為兩感如所定日期略示淺深次序耳故曰其未滿三日者可汗而已其滿三日者可泄而已可以見也要之素問之義止是熱病與仲景之寒熱兼該者判然兩途矣素問仲景之異從來注家分辨不清往往牽混遂至徒分頭緒泛無統紀故茲首辨之王氏溯洄集曰夫素問謂人傷於寒則為病熱者言常而不言變也仲景謂或熱或寒而不一者備常與變而弗遺也仲景蓋言古人之所未言大有功於古人者雖欲偏廢可乎程氏後條辨贅余曰素問之六經是一病共具之六經仲景之六經是異病分布之六經素問之六經是因熱病而原及六經仲景之六經是設六經以該盡衆病二家之言特得其要又中西惟忠山田正珍亦並有辨稍確仲景所謂陰陽也者寒熱之謂也曰病有發熱惡寒者發於陽也有無熱惡寒者發於陰也此則全經之大旨其發熱無熱是病熱病寒之明徵也但其章本為邪之初犯分表熱表寒之異而設此章之義溯洄集始發其蘊程錢諸家皆根據之然繇是推求則諸般疾證皆自歷然矣原夫其所以為熱為寒之理固不以所受之地位注家以陽經陰經為說缺妥亦非所感之邪有寒與熱也互見卷末答問宜並考蓋人不論強弱必有一罅隙而邪乃乘入之罅隙者何或勞汗取涼或衣被失宜或食飢入房出浴之等凡一時適有表開皆是也評熱病論曰邪之所湊其氣必虛是言氣所虛處邪氣得湊百病始生篇曰風雨寒熱不得虛邪不獨傷人所謂虛者言虛邪之風與身形之虛又楊上善太素注曰風氣之邪得之因者或因飢虛或因復用力腠理開發風入毛腠灑然而寒腠理閉塞內壅熱悶皆可以證矣又內藤希哲山田宗俊亦嘗論文缺精切仍不録其既乘入也隨其人陽氣之盛衰化而為病於是有寒熱之分焉虛家有陰虛陽盛者實人亦有內寒者蓋陰陽盛衰之機不可一例而言學者宜精思陽盛之人邪從陽化以為表熱此發於陽之義也詳述於太陽病中陽衰之人邪從陰化以為表寒此發於陰之義也詳於少陰中發於陽者其陽甚盛與邪相搏則傳為裡熱詳於少陽陽明中如胃氣素弱為邪所奪或內有久冷則變為裡寒詳於太陰少陰中發於陰者其陽甚衰不與邪抗則傳為裡寒詳於少陰中如本有伏陽更能撐持則變為裡熱亦詳於少陰此陰陽之要受病之略也經曰邪氣盛則實精氣奪則虛其義可見也經者素問通評虛實論也先教諭嘗有詳解今愚此說實本於其意云從前諸家間有論及於此者雖或不無礙然宜以為據仍表出於下龐氏曰凡人稟氣各有盛衰宿病各有寒熱因傷寒蒸起宿疾更不在感異氣而變者假令素有寒者多變陽虛陰盛之疾或變陰毒也素有熱者多變陽盛陰虛之疾或變陽毒也此說已拈廣要中然論病因人而化者實以龐氏為藍本故又列於茲程氏曰人之府藏不但各有虛實寒熱之不等而虛實寒熱中更有剛柔強脆之不等風寒固不擇而施府藏則隨材各得柯氏曰去病寒熱當審其人陰陽之盛衰不得拘天氣之寒熱必因其人陰陽之多少元氣之虛實不全憑時令之陰陽為轉移也金鑑曰六氣之邪感人雖同人受之而生病各異者何也蓋以人之形有厚薄氣有盛衰藏有寒熱所受之邪每從其人之藏氣而化故生病各異也是以或從虛化或從實化或從寒化或從熱化譬諸水火水盛則火滅火盛則水耗物盛從化理固然也誠知乎此又何疑乎陽邪傳裡變寒化熱而遂以為奇耶又軒村曰靈樞五變篇所論能盡受邪之理云黃帝曰一時遇風同時得病其病各異願聞其故少俞曰善乎哉問請論以比匠人匠人磨斧斤礪刀削斫村木木之陰陽尚有堅脆堅者不入脆者皮弛至共交節而缺斤斧焉夫一木之中堅脆不同堅者則剛脆者易傷況其材木之不同皮之厚薄汁之多少而各異耶云云是也軒又曰宋人有陽臟人陰臟人語就其人體質而為言蓋陽臟人感邪則為熱證陰臟人感邪則為寒證也愚謂軒說並是又陶隱居曰邪氣之傷人最為深重經絡既受此氣傳入藏腑隨其虛實冷熱結以成病亦足以發焉寒熱者病之情也病有所在部位人有體氣強弱故表裡虛實相配以為三陽三陰而證狀機變於是乎無不出於此表者軀殼之分是也里者胃府是也中西惟忠曰胃者津液之原有生之本也飲食之入與前後之出顯然可度之於外而察內之所病矣愚又謂陽氣之盛衰必驗之胃而倉廩之官邪最易陷入且外感之病倘傷及臟則非藥之所能治皆是仲景之所以專主胃腑也虛者無形之名氣虧之義實者有形之名氣盈之義蓋陽盛則熱故實證多熱火熱炎上故表證多熱陽衰則寒故寒證多虛水勢沉下故寒證多里然事不可以一定故熱亦有里有虛寒亦有表有實此所以分而為六也太陽病者表熱證也少陽病者半表半裡熱證也此二者未藉物為結然其體氣則實矣陽明病者裡熱實證也太陰病者裡寒實證也少陰病者表裡虛寒證也而更有等差厥陰病者裡虛而寒熱相錯證也此三陽三陰之梗概也表裡俱有寒熱但半表半裡有熱證而無寒證蓋寒是潤下之氣非可羈留隙地其理不待辨也如諸家所說一系經絡藏府之義愚豈求異前輩姑攄所見以俟後之識者爾考諸家說皆主經絡藏府而各有異同今摘其略成氏以太陽為表陽明為胃少陽為半表半裡太陰為陽邪傳裡少陰邪氣傳裡深厥陰熱已深方氏以太陽為皮膚陽明為肌肉少陽為軀殼之內藏府之外而三陰唯配各藏張志聰及錫駒則以盧之頤為原牽合氣化之說程氏則以為六經實即表裡府藏之別名汪氏則謂仲景之意一同內經則以諸寒證自為一書柯氏則據素問皮部論強立辨別魏氏則以陽為表陰為里而稱太陰里中之表少陰里中之半表裡厥陰里中之裡表裡中更分表裡劉完素保命集既有其說尤氏則三陽必分經腑而三陰必分經臟寒熱如夫皇國諸注則擯斥經絡藏府專主病位然其說多出虛揣殊少實效要之三陽病從有定論至三陰病則各注殊見未見有確核之說矣仲景之命病本有定名然亦有彼此更稱而示人以不可拘執者曰傷寒六七日無大熱其人躁煩者此為陽去入陰故也曰傷寒三日三陽為盡三陰當受邪云云此所謂陰陽就熱證中標表與里者也曰病發於陽而反下之熱入因作結胸病發於陰而反下之因作痞也此所謂陰陽於太陽中標虛與實者也蓋虛實表裡以配陰陽則表為陽里為陰實為陽虛為陰然經中陽病亦有里陰病亦有表有實則不可據以解篇題陰陽之稱至於經絡藏府之言經中間或及之然本自別義非全經之旨閔氏釋行經等義與輯義所舉諸說相發文繁不録宜參考軒村曰經中經字皆當為表字看猶指里為藏亦可備一說也方氏曰六經之經與經絡之經不同猶儒家六經之經猶言部也程氏曰經則猶言界也又曰經猶言常也柯氏曰仲景之六經是經略之經而非經絡之經愚謂本經中無六經字則諸說殊為贅疣經絡藏府非全經之旨卷末答問有辨唯以寒熱定陰陽則觸處朗然無不貫通也成氏注傷寒例若或差遲病即傳變曰傳有常也傳為循經而傳如太陽傳陽明是也變為不常之變如陽證變陰證是也蓋三陽三陰之次第陽則自表而里陰則自實而虛寒極而熱此其概也病機不一難得定論然今原之經旨如三陽病自太陽而少陽而陽陽陽明無所復傳又有太陽直傳陽明者至陽變為陰則有太陽變太陰者有太陽變少陰者有少陽變太陰或少陰或厥陰者如三陰病太陰之實變為少陰之虛少陰自有直中少陰之寒極為厥陰之燥熱至陰變陽則有太陰變為陽明者有少陰變諸陽證者如三陰將愈必須寒去陽旺耳此傳變之略也如其委曲次卷悉之矣詳前輩傳變諸說唯王履稍得其要然立言猶不免有病他湊合內經或論再傳之義或立傳手不傳足之說或分循經越經等目或為陰證不傳變之說皆現與仲景之旨背馳矣至如方氏三綱傳變之說則印定後人眼目其害最甚夫病自表而里自里而表自實而虛自虛而實自熱而寒自寒而熱有如壞敗有如兼挾千態萬狀不可端倪然其情機則實不能出於三陽三陰範圍之外也已矣
