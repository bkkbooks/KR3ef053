body:
  text: 卷二述太陽病太陽病者表熱證是也蓋邪之初感必先犯表則正氣不暢並而為熱山田正珍注提綱曰頭項強痛謂頭痛項強瓜蒂散條云病如桂枝證頭不痛項不強可以徵焉此條統論中風傷寒故啻云脈浮而不分緊與緩也惡寒亦兼惡風言惡風輕惡寒重舍輕取重所謂舉大而小從者也其不言發熱者以有或已發熱或未發熱之異也此說為是此病大端有二一則其人腠理素疏者倘被邪客其表愈開邪不內迫徒泛漫肌肉故衛特受傷觀衛氣不與營氣和諧及營弱衛強等語則中風之邪不著營分也明矣是屬表虛虛者疏泄之義非虛乏之虛所謂名為中風者矣治以桂枝湯調和營衛而汗解之尤怡醫學讀書記曰傷寒發熱者陽氣被鬱而不伸也中風發熱者陽氣被引而外浮也郁者必發之浮者不徒解散而已此桂枝湯所以兼陰陽通合散為劑也一則其人腠理素致者邪正相搏更致緊閉遂迫骨節故營衛俱傷觀營衛俱病骨節煩疼條則傷寒之邪亦傷衛分也明矣是屬表實實者緊閉之義非結實之實所謂名為傷寒者矣尤氏曰不言無汗者以脈緊該之也治以麻黃湯發泄郁陽而汗解之麻黃為汗藥中之最烈者金匱苓甘五味加姜辛半杏湯條曰麻黃髮其陽蓋發陽二字實盡其功用不待李時珍發散肺經火鬱之說也其得桂枝而發表更鋭者猶大黃之於芒硝耳金匱又曰其人形腫者加杏仁主之其證應內麻黃以其人遂痹故不內之據此杏仁之與麻黃唯有緊慢之別而其開鬱則稍均不特為治喘而用也且此方之妙固在單捷所以不用薑棗等品柯氏說雖密至大青龍而不通矣此其分也詳此二證朱氏成氏主風寒營衛相配之說爾來諸家無復異議迄至柯氏辨駁殆盡而張志聰實闢其端說見集注凡例及侶山堂類辨惜語焉未詳耳尤氏曰邪氣之來自皮毛而入肌肉無論中風傷寒未有不及於衛者其甚者乃並傷於營耳郭白雲所謂涉衛中營者是也亦為明確今考郭氏猶分風寒然其言頗精仍拈於下曰問曰太陽一經何其或有汗或無汗也雍曰系乎營衛之氣也營行脈中衛行脈外亦以內外和諧而後可行也風邪之氣中淺則中衛中衛則衛強衛強不與營相屬其剽悍之氣隨空隙而外出則為汗矣故有汗者衛氣遇毛孔而出者也寒邪中深則涉衛中營二氣俱受病無一強一弱之證寒邪營衛相結而不行則衛氣無自而出必用藥發其汗然後邪去而營衛復通故雖一經有有汗無汗二證亦有桂枝解表麻黃髮汗之治法不同也桂麻二湯其證不一今僅舉大較後柴胡承氣等類皆準此就中輕重更有等差有表虛經日不愈以致邪郁者有表虛重一等血氣俱乏者有表虛重一等邪著筋脈者有表實輕一等邪著筋脈者有表實重一等熱勢更甚者大抵隨其人強弱為異今具論於下仲景既以風寒為表虛實之目而更有表虛冒傷寒有表實冒中風蓋是互文見意在使人不實講邪氣故今所區分一就其證以虛實為等至冒頭之義則卷末答問中詳之矣方氏以桂麻青龍三證為太陽三綱諸家多沿其誤特柯氏極排斥之更有明辨今摘出之以備於考曰按許叔微云桂枝治中風麻黃治傷寒大青龍治中風見寒脈傷寒見風脈三者如鼎立此方氏三大綱所由來而大青龍之證治自此不明於世矣不知仲景治表只在麻桂二法麻黃治表實桂枝治表虛方治在虛實上分不在風寒上分也蓋風寒二證俱有虛實俱有淺深俱有營衛大法又在虛實上分淺深並不在風寒上分營衛也夫有汗為表虛立桂枝湯治有汗之風寒而更有加桂去桂加芍及加附子人參厚朴杏仁茯苓白朮大黃龍骨牡蠣等劑皆是桂枝湯之變局因表虛中更有內虛內實淺深之不同故加減法亦種種不一耳以無汗為表實而立麻黃湯治無汗之風寒然表實中亦有夾寒夾暑內寒內熱之不同故以麻黃為主而加減者若葛根湯大小青龍麻黃附子細辛甘草麻黃杏仁甘草石膏麻黃連翹赤豆等劑皆麻黃湯之變局因表實中亦各有內外寒熱淺深之殊也葛根湯因肌肉津液不足而加葛根大青龍因內熱煩躁而加石膏小青龍以乾嘔而咳而加半夏細辛乾薑麻黃附子細辛二方以脈沉而加附子若連翹赤豆梓皮濕熱發黃而加諸劑皆因表實從麻黃湯加減何得獨推大青龍為鼎立耶蓋中風傷寒各有淺深或因人之強弱而異地之高下而異時之乖和而異以上柯說考千金翼方曰尋方之大意不過三種一則桂枝二則麻黃三則青龍此之三方凡療傷寒不出之也然則三綱之說自孫氏作其俑而如方氏實本於朱氏成氏之言今柯氏歸咎於許氏不檢之甚矣又按大青龍條外臺所引中風見傷寒脈者可服之者恐王氏斷章取義非唐時舊本有此文也有表虛經日不愈以致邪郁者何桂枝麻黃各半湯桂枝二麻黃一湯桂枝二越婢一湯證是也其證輕重不均故有三方之設焉蓋桂枝證失汗數日邪郁肌肉故熱多寒少其滯稍深故如瘧狀發作有時但本是表虛故有嫌麻葛之發今則鬱甚有桂枝之力不能及者是以酌量麻桂二方言日二三發者其邪稍重言日再發者其邪稍輕不言發數者其邪尤重且桂枝二越婢一其力緊桂二麻一其力慢桂麻各半在緊慢之間矣此三條其意互發各半湯其證特審他二條則文甚略矣蓋各半湯條八九日者約略言之之辭而二條亦冒之發熱惡寒熱多寒少三證疊言而麻一湯省寒熱但言如瘧狀越婢一湯言寒熱而省如瘧狀其人不嘔清便自可亦二條所蘊如瘧狀疑於少陽證故別以不嘔熱多疑於陽明證故別以清便自可欲自可之欲字當從玉函芟去為是一日二三度發與脈微緩者文勢一串故似為愈候然照麻一湯實是表郁所致宜接面色反有熱色者看考面赤證參二陽並病面色緣緣正赤及陽明病面合赤色當是表郁兼裡熱者使然今但表鬱而有之故下一反字不得小汗出者言得病以來未曾小小發汗故致此表郁且身癢也更發汗更吐更下三更字當與反字同義桂二麻一湯證嘗經大汗亦是失治然幸無亡陽之變亦不轉屬陽明猶纏滯表分纍日不解但以其既汗比之二證則其鬱為輕龐氏於脈洪大下補證候不改四字與玉函但字其義相發桂二越婢一湯證其熱最重猶麻黃之有大青龍假石膏之力以越散郁陽脈微弱者不可發汗者蓋戒此方之不可輕用與各半湯之脈微而惡寒大青龍之脈微弱同例乃系倒筆法但此條文甚約故諸家不察及特中西惟忠注稍為近之惜猶缺明暢要之此三條從未見確解如方氏以為兩傷輕證尤屬錯謬唯內臺方議各半湯下曰桂枝湯治表虛麻黃湯治表實二者均曰解表霄壤之異也今此二方合而用之者乃解其表不虛不實者也八九日不已反如瘧狀者乃先發表不盡微滯於經而不得出故一日二三度發也斯說殊妥然猶未為精審今以經釋經非敢好異也唐不岩對論三方云總是一太陽病病與時日有淺與深脈與形證有應與否權衡劑量不失銖黍於此見古人立方之妙此言為然有表虛重一等血氣俱乏者何傷寒脈浮自汗出小便數心煩微惡寒腳攣急是也此證不啻表疏其人陽津素少故雖桂枝本湯猶過其當蓋與少陰直中稍相近似而不比彼之寒盛故雖經誤汗僅須甘姜而陽回之後或變胃燥若其重誤治則變為純陰證也此條本證次條擬以桂枝增桂加附子者殊不無疑何以言之夫既為附子所宜則誤汗便厥之際不得不徑與四逆而僅用單味小方竊恐萬無其理蓋自汗出小便數心煩等證與傷寒二三日心中悸而煩稍同其情而系從前虛乏為邪凌虐者則亦是小建中所主也柯氏於未發汗之前擬以芍藥甘草湯尤氏謂此桂枝證然陰虛而裡熱當以甘辛攻表而以甘寒顧里乃反與桂枝湯治表而遺里宜其得之而便厥也二氏之說亦有所見矣尤氏於次條曰中間語意殊無倫次此豈後人之文耶舒氏亦曰此條說出許多無益之語何所用之吾不能曲為之解也並本於柯氏之刪也趙氏論本條用藥之意曰以上用藥次第先熱後寒先補後瀉似逆而實順非仲景之妙孰能至是哉後之學者可不以此為法推廣而應變張卿子曰此條見傷寒隨證用藥如轉圜法也先教論亦曰金匱咳嗽小青龍下已之後敘證五變應變加減其意殆與此條同示人以通變之法也趙言出汪氏選録頗為辨竅文繁不具録桂麻各半湯之脈微而惡寒桂枝二越婢一湯之脈微弱大青龍湯之脈微弱汗出惡風蓋此類證也有表虛重一等邪著筋脈者何桂枝加葛根湯證是也其證一與桂枝同啻頂背強𠘧𠘧為異項背者大筋之所束其𠘧𠘧然即是邪著筋脈之徵所以加葛根也提綱既言頭項強痛則桂枝證本有項強然未及背且不𠘧𠘧然也𠘧𠘧王氏據赤烏𠘧𠘧為解近來焦循撰毛詩補疏亦有其說然作短羽鳥釋者於拘強之義固為襯著二家所辨今不敢從反汗出之反字對葛根湯證言蓋邪著筋脈稍屬緊閉宜以無汗為正今表疏人而邪著筋脈故於汗出下一反字矣煮法去上沫三字宜削是後人因方中有麻黃而誤添者陶隱居稱麻黃不掠去其沫令人煩又葛根芩連湯無此字面可以互徵上節證與此節證俱為表虛重一等但彼則病近於虛此則病近於實又此證宜次於各半湯等證前今列於此者在使人與葛根湯證相對看耳有表實輕一等邪著筋脈者何葛根湯證是也蓋其人表氣稍實必須麻黃之發然邪未迫骨節而猶著筋脈是病在桂麻二證之間故酌量二湯以為之治也葛根柯氏說極當然以為有和里之功者殆不然蓋為發表中之涼藥故能生津液而舒筋脈也本草圖經云張仲景治傷寒有葛根及加半夏葛根黃芩黃連湯以其主大熱解肌開腠理故也有表實重一等熱勢加甚者何大青龍湯證是也其候一與麻黃證相同不言喘者蓋省文也但煩躁為彼所無徐大椿曰凡辨證必於獨異處著眼是山田正珍曰不汗出言雖服麻黃而不汗出與無汗有別存考此表熱極郁內氣不能宣達則有麻黃湯力不能及故加石膏之涼藉以發越之此證惡寒而無渴可知非里有熱者石膏雖專治里倘與麻黃配用則相藉以走表分而散其壅鬱如越婢湯亦為然要此湯證於太陽中病為最重故不得不倍用麻黃唯其熱極郁甚單用麻桂必有兩陽相格之虞故佐以石膏則鬱開熱潰作汗而解蓋龍升雨降之妙在溫涼相併處柯氏所解迥勝前注然猶未為盡尤氏醫學讀書記曰大青龍治風寒外壅而閉熱於經者夫熱鬱於經而不用石膏汗為熱隔寧有能發之者乎此說本於王文祿而殊為協當又吳人駒云發散表邪皆以石膏同用者蓋石膏其性寒寒能勝熱其味薄薄能走表非若芩連之輩性寒味苦而厚不能外達也此說亦得按元和紀用經陽粉散謂病當發汗而汗不止不止則亡陽當溫撲之用麻黃藁本白芷米粉末之以粉止身汗疑是龐氏諸家之所本也又三國志華他傳注稱有婦人長病經年世謂寒熱注病者他用寒水汲灌滿百灌他乃使然火溫床厚覆良久汗洽出著粉汗燥便愈然則漢時神醫多用粉法而未知兩夫子之方果是相同否復服汗多者表陽虛故惡風里陽虛故煩躁不得眠汪氏以為邪熱未除恐不然如脈浮緩身不疼但重者其機異而其情同者也蓋邪迫骨節故脈緊身疼痛今邪不迫故脈緩身不疼然身重而兼見前條諸候則知是均屬表郁但脈緩身重疑於少陰之脈遲身重故徵以乍有輕時更云無少陰證者而示精心體察不可輕試之戒又麻黃湯證亦必有邪不緊迫與此同機者可推而知也以上太陽病要領也此他得病之初有所挾者有停飲相觸治兼驅利者如喘家及小青龍湯證之類有素稟虛弱不可徑汗者如小建中湯及尺中遲咽喉乾燥等諸證之類又有風濕相搏者並類列於後卷中矣至其傳變則里之受病皆無不自表故其類不一或傳少陽或直傳陽明或直變太陰或直變少陰以上傳變皆有明文蓋本病變為陰者必多自桂枝證其理何也既是表疏比之表實者陽氣稍弱故其重一等者或須溫養則其易變為陰也明矣但少陰直中非經太陽者而厥陰則病之所極蓋不自此遽變也並是玩經文而自知更有拘下後軒熙曰過經猶言過表存考心下急急字無明解柯氏曰急者滿也猶不了考急是緩之對蓋謂有物窘迫之勢非拘急之謂李氏脾胃論曰裡急者腹中不寬快是化蓋所謂不寬快者以釋裡急則未為當而於心下急則其義甚親桃核承氣條少腹急結之急亦同義也此方芍藥蓋取之通壅宜參後桂枝加芍藥湯陶氏本草序例曰枳實若干枚者去穰畢以一分准二枚據此此方枳實四枚准今一分七釐七毫六絲比他藥殊輕大小承氣枳實梔子湯並稱幾枚而其舉分量者麻仁丸則半斤四逆散則各十分仍知仲景用枳實本不甚輕陶說可疑此方再煎其義難晰俟考其一柴胡加芒硝湯證是也此其壅實稍輕於前證而以丸藥之故里邪膠固殆屬壞病此條難讀然程注頗明竅但此實得之攻後云云者殊似含混蓋此證本是少陽陽明並病以用下失法徒擾腸胃而邪與實依然具存者程又曰去者非所留留者非所去故溏者自溏結者自結而結者既結溏者益溏矣此說反覺直切又此證既是兼里乃似宜蚤從大些胡雙解之法而先用小柴胡者蓋以丸藥誤下不欲續以快藥仍姑清和以待胃安也且其下利故壅實輕於大柴胡證而燥結則有甚是以不藉大黃之破實而殊取芒硝之軟堅矣按以此方為大柴胡加芒硝原出於黃氏而宗印亦有其說軒熙曰此條與次調胃條其云十三日者亦是約略之辭或以為十餘日之訛者殆未是也其一柴胡加龍骨牡蠣湯證是也此以誤下邪陷於裡加以諸證錯雜蓋壞之甚者矣成氏曰傷寒八九日邪氣已成熱而復傳陽經之時下之虛其里而熱不除胸滿而煩者陽熱客於胸中也驚者心惡熱而神不守也小便不利者裡虛津液不行也讝語者胃熱也一身盡重不可轉側者陽氣內行於里不營於表也與柴胡湯以除胸滿而煩加龍骨牡蠣鉛丹收斂神氣而鎮驚加茯苓以行津液利小便加大黃以逐冒熱止讝語加桂枝以行陽氣而解身重錯雜之邪斯悉愈矣尤氏曰傷寒下後其邪有並歸一處者如結胸下利是也有散漫一身者如此條所云諸證是也二說亦似精當喻氏以為伏飲素積為變之最巨者叵從又此證一身盡重與三陽合病身重難以轉側其機稍均此當入兼變諸證中然無類可附仍列於斯以上少陽病要領也此他有兼虛小建中湯證出兼變虛乏中其愈有振汗而解者成氏謂經下里虛邪氣欲出內則振振然蓋原於辨脈法其人本虛是以發戰雲云軒熙曰太陽病未解脈陰陽俱停必先振栗汗出而解諸注皆為自愈之候恐非蓋振汗非太陽所有脈陰陽俱停想系邪在少陽者其病跨於表裡故脈不偏見猶是金匱脈兩出積在中央之理倘用柴胡而鬱邪離窟則振汗而解也下文云汗出云下之俱指藥治要是列舉三陽愈候者故下三而解字此說未知當否姑録備考其傳陽明有為白虎證者服柴胡湯已渴者條可徵有為承氣證者經中多言之其變或為太陰或為少陰或為厥陰殆不一定矣變為三陰經無明文然太陽既變太陰則少陽亦未可不變太陰其變少陰者近世甚多如厥陰則其部位及寒熱勝復並與本病稍相類似乃其變為固其分也蓋以其界表裡所繫不一而醫之失治多於此位故兼挾變壞之證少陽最多而經中所舉不過數章學者當擴而充也吳有性著溫疫論主疫邪自口鼻入之說蓋膜原實少陽之部而達原飲三消飲有地方之宜或驗於今者然審其主證猶不能出大小柴胡之例竊想當吳氏之時邪勢暴厲遽犯半表裡故遂立其說乎董氏西塘感症引傷寒心法稱見今世甚少太陽症其書適與吳氏時世相近可以證矣世偶有墨守吳氏之法忌用桂麻視柴胡為餘熱之治者故附識於茲述陽明病陽明病者裡熱實證是也邪熱陷胃燥屎搏結即所謂胃家實者也胃家實該諸病在胃宜下證之稱但正陽陽明之胃家實專指大承氣證也又前注多立陽明經腑之別實失經旨矣白虎證系胃熱而無實者即溫病是今自列於次卷又中風中塞是不於胃家實上有分別則亦不復具論如其來路或自大陽或自少陽而其等不一病之輕重亦隨而異有其人胃素有熱邪勢亦盛相藉遽實者其病為重即正陽陽明也本篇大承氣第一條玩語氣似曾不經誤治而邪氣自實者有自太陽桂枝證發汗過多胃液為燥者其病最輕即太陽陽明也脈陽微而汗出少者脈浮而芤及麻子人丸三條可以徵焉脈經脾病證曰脾約者其人大便堅小便利而反不渴成氏以太陽病若吐若下若發汗後與小承氣條為脾約恐非又不更衣十日無所苦與脾約自別有自少陽病誤發汗利小便以為胃燥者其病頗輕即少陽陽明也太陽陽明少陽陽明喻氏誤為並病汪氏擬方蓋本其意然誤治之後亦或為正陽陽明有自太陽病誤汗下利小便者如問曰何緣得陽明病條是也有自太陽病失汗者如本太陽和得病時發其汗汗先出不徹是也次條相承亦謂失汗胃實蓋傷寒發熱無汗即是表實證其嘔不能食亦風寒外束之故此證倘發汗不徹則不宜有汗而反汗出濈濈然者邪氣內結以屬陽明也有自少陽病誤汗者如少陽篇發汗則讝語是也然則輕證所由亦不止一端也仲景先區三等以示輕重更出以上諸條以盡其變學者宜密察其為證也不惡寒惡熱濈濈汗出汗出有二端有遍身濈濈者為裡熱蒸迫之故有手足濈濈者為邪熱內結之徵巢源活人書並有掌心汗濕之說身重短氣腹滿而喘潮熱潮熱明理論所說似穩貼或不言日晡者蓋省文也讝語不大便胃中有燥屎胃中猶言腹中不必深講經言部位往往類此且屎在大腸而其燥結不下者實由胃熱遏住王好古以為地道不通火逆至胃者慎矣脈實大遲大承氣條曰脈遲小承氣條曰脈滑而疾是兩相對待之詞而遲脈實為應下之正候千金方以脈朝夕駃為實癖可下可疑此胃實正證大承氣湯主之若不識人循衣摸床惕而不安微喘直視者病加劇而正亦虛其猶用前方者不畏虛以養病也吳又可補瀉兼施蓋即此證且此條本分三等輕重雖異其為胃實則一故皆以大承氣湯主之或劇熱迅傳勢近危惡者則有急下之例少陰急下條其來路雖異其危劇則一吳又可所謂急證急攻者亦此類也又急字參成氏少陰篇急溫之之解其義更明矣大承氣諸條其有餘義者今述於下陽明病潮熱大便硬者條首段言既有潮熱則大便雖微硬知其熱既實故可與大承氣倘未潮熱者恐其熱未實雖不大便六七日難必其燥屎有否故與小承氣試之也又周氏曰其後發熱是必日晡時作此又未盡之邪復結而硬但既攻之後所結不多只小承氣湯和之足矣錢氏曰其後又復發熱者乃潮熱之類也二說與輯義意相合病人不大便五六日繞臍痛條錢氏解發作有時為日晡潮熱之類此本於柯氏蓋言繞臍痛煩躁之發作有時猶日晡潮熱之理非別有熱氣發作也金鑑本於程氏曰燥屎穢氣上攻則煩躁不攻則不煩躁故發作有時也亦通病人小便不利大便乍難乍易條尤氏曰小便不利者其大便必溏而有燥屎者水液雖還入胃猶不足以潤之故大便乍有難時而亦乍有易時也此與錢氏異義姑録備考得病二三日脈弱條喻氏注不確此條二雖字為其眼目蓋可下證以不能食為常然無太陽柴胡證煩躁心下硬不大便至四五日則雖有能食之似胃和猶以小承氣與之若不大便六七日雖有不能食之似胃實其小便少者初硬後溏宜暫待其實不可遽下此二證對示以欲人通變也又大便初硬後溏自有二端其一系寒實證是不終結者也其一系熱實未成是終結者也宜分別看如胃實正證而輕一等者小承氣湯主之大承氣證有姑用是湯探試者其義可見也又小承氣證陽明病其人多汗以津液外出胃中燥及太陽病若吐若下若發汗後條並是津液受傷似是調胃所宜然多汗本陽明所固有則其有滿實蓋寓之言外者耳如液燥熱搏其實則輕者調胃承氣湯主之大承氣證有液甚燥者但病屬急劇不得已而奪之者爾此方所主則病勢稍慢非潤而蕩之不可也大抵得之誤汗吐下津液虧乏者為多如吐後腹脹痛者亦是似大實而非者尤氏曰設遇庸工見其脹滿必以枳朴為急矣是又太陽中篇過經二條其證殆屬壞病者也成氏曰大熱結實者與大承氣湯小熱微結者與小承氣湯以熱不大甚故於大承氣湯去芒硝又以結不至堅故減厚朴枳實也又云岐子傷寒保命集曰大承氣者厚朴苦溫去痞按此云痞者蓋氣閉之義非心下痞之痞枳實苦寒泄滿芒硝味鹹而能軟堅大黃味苦寒能泄實痞滿燥實四證全則可用故曰大承氣湯小承氣者大黃味苦寒泄實厚朴苦溫去痞痞實兩全可用也故曰小承氣湯調胃承氣者大黃苦寒泄實芒硝鹹寒而能耎堅潤燥甘草和平和其中燥實堅三證全者可用故曰調胃承氣湯此說頗當至陶氏六書則曰病有三焦俱傷者則痞滿燥實堅全邪在中焦則有燥實堅三證上焦受傷則痞而實拘鑿殊甚閔芝慶嘗闢其繆文繁不録又吳又可曰三承氣功用倣佛又曰功效俱在大黃余皆治標之品也並缺辨晰又王好古學三方主證輯義漏載調胃證仍補出之曰謂胃承氣湯治實而不滿者腹如仰瓦腹中轉矢氣有燥糞不大便而讝語堅實之證宜用之又大黃酒製程知說是然抵當湯不用芒硝而大黃酒洗大陷胸湯丸大黃牡丹湯並有芒硝而大黃生用故其說不能無疑存考幼幼新書惠眼觀證芍藥散治大小便下藥不通者於調胃本方加芍藥當歸保命集當歸承氣湯於調胃方中加當歸姜棗水煎三法六門玉燭散以四物湯承氣湯朴消各等分水煎去滓食前服之傷寒心要産後如血不盡則以涼膈與四物合煎調理經血甚者大承氣合四物乃瀉中有補也又曰大承氣合四物治婦人一切血積血聚等疾如紅花尤妙脾約則病最輕而但胃燥故麻子人丸僅潤下之本草圖經引作枳實一斤十丸下有食後服之字曰唐方七宣麻仁丸亦此類也徐大椿曰此潤腸之主方又陶隱居曰如梧子者以二大豆准之又杏仁熬黑陶氏有說宜參熱去津竭而大便硬者以蜜煎導之導法用蜜用土瓜根用豬膽汁俱取潤肛設更用皂角諸品徒覺多事本草開寶引陳藏器云主大便不通取豬羊膽以葦筒著膽縛一頭內下部入三寸灌之入腹立下此方出北齊道興治疾方但主治文泐滅難考又梅師方肛門主肺肺熱即肛門塞腫縮生瘡白蜜一升豬膽一枚相和微火煎令可丸丸長三寸作挺塗油內下部臥令後重須臾通泄此陽明病要領也此他有兼素虛者如無汗身如蟲行者詳見兼變虛之中及不大便脈微澀者是也宗印曰明日不大便而脈反微澀者邪熱實而正氣虛也微為氣虛澀則無血此胃氣虛於裡雖有熱實不可攻之故為難治此說與汪意相同有兼表者有兼半表半裡者二證詳於合併中但脅下硬滿不大便而嘔舌上白胎與小柴胡此係其實少陽而似陽明者有迫血分列於兼變瘀血有挾濕鬱列於濕熱中亦宜隅反爾蓋本病無所復傳經有明文大抵下後清潤病日就愈此吳氏所以有養營清燥諸湯也然有攻下過度胃虛熱迸以為厥陰者殆局外之變也古人有下多亡陰之戒蓋下多胃亦虛亡陰必內燥勢不得不為厥陰今世往往有致此者詳本篇中文易了而義難曉者凡有五條曰初欲食小便反不利大便自調曰反無汗而小便利曰但頭眩不惡寒曰脈浮而緊者必潮熱發作有時曰太陽病寸緩關浮尺弱是也太陰病與陽明其位與有實則相同而自有寒熱之異故本篇點出以便照對但猶題以陽明病是以注家不察多致論混今詳開於次款讀者宜考述太陰病太陰病者裡寒實證是也蓋其人內有久寒倘遇邪客雖初得陽證及其入里則遂從寒化而胃氣猶有守故能搏實者矣脈經曰下利而腹痛滿為寒實當下之此語出其平下利中考前後諸條似即雜病論之遺然則本病為寒實其義甚明矣蓋雜病寒疝寒脹之類亦系寒實故金匱腹滿寒疝證治間與本篇相發又寒實字面出三物白散條及腹滿篇第四條其所受者有自太陽病誤下來則其不誤下亦或有變成者及或有自少陽來者皆可知也成氏曰太陰病者陽邪傳裡也此言有味豈因三陰中太陰特有桂枝法而發乎曰自利曰吐食不下曰時腹痛皆寒盛之徵曰腹滿曰下之胸下結鞕俱壅實之驗所謂下之者蓋指承氣十棗之類而言其病不似少陰之脫故胸下結鞕猶是崔氏所謂下後虛逆氣毒相激之類也胸下蓋即心下也太陰唯於末條言脈候似不必其正脈然要不出沉遲細弱等也其初起滿實陽氣能持者設桂枝加芍藥及加大黃湯以為和泄溫利之法此條曰本太陽病則時既離表可知蓋誤下之後胃氣生寒表邪陷實以致是證顧下後便祕者桂枝湯加倍芍藥既非發表亦與建中不同其旨考小柴胡加減法曰若腹中痛者去黃芩加芍藥三兩成氏曰加芍藥以通壅又明理論曰宜通而塞為痛邪氣入里裡氣不足寒氣壅之則腹中痛芍藥味酸苦微寒酸性泄而利中加之則裡氣得通而痛自已愚謂此方芍藥亦取通壅次條設當行大黃芍藥者語氣可以徵焉張志聰侶山堂類辨曰芍藥氣味苦平苦走血故為血分之藥苦下泄故本經主邪氣腹痛除血痹破堅積寒熱因其破泄故太陰篇云云今人咸云芍藥主酸斂而不知有大黃之功能此說則過當矣病勢更劇大實痛者加大黃以疏之亦猶大黃附子湯之例以病屬寒主在溫利擴充此理則大黃附子湯及溫脾湯等皆宜治本病也脈經所謂當下之者亦加大黃湯證其下利因有寒積而氣下墜所致與四逆證之下利自異要知寒實用下於脈之有力無力腹痛之微甚著眼始為親切陳氏三因方曰太陰屬脾中州土也性惡寒濕非乾薑附子不能溫燥又曰至太陰脾經溫燥不行亦當溫利自陽明出如溫脾丸用大黃者是也此其言雖曖昧不明似稍知太陰之為寒實者矣如其脈弱者要加斟量太陰為病之為字疑衍提綱諸條及風溫之外經無比語例續自便利恐是承上條而言醫下之後續自便利柯氏意亦似然太陽中篇傷寒醫下之續得下利殆一例也蓋此條示寒實動變陽虛不可輕下之戒病既重者則用四逆輩以溫散之提綱之證蓋謂此也不渴即與少陰分別處彼以胃少液故渴此以寒氣壅閉津液猶持故不渴成氏曰自利而渴寒在下焦自利不渴寒在中焦恐誤云四逆輩而不云四逆湯意在溫散而不在治厥也朱氏活人書以來療本病有用理中湯丸者蓋能得經旨者矣蓋寒實之病雖胃猶閉持以寒固胃之所忌其實之極中氣必敗不似熱證之久實故初起雖用溫利至其重者則宜扶陽散寒耳玉函經曰寒則散之此之謂也桂枝加芍藥證曰時痛加大黃證曰大實痛提綱曰時腹自痛此足以知其病機而措治之法亦見矣此太陰病要領也他有兼表者桂枝湯條是也少陰兼太陽治法先里後表太陰不似少陰之脫且桂枝湯程氏所謂胎建中之體無礙於溫者此所以猶先其表乎其愈有從外者太陰中風是也成氏注辨脈首條曰陰病見陽脈而主生者則邪氣自里之表欲汗而解也如厥陰中風脈微浮為欲愈不浮為未愈者是也據此說則三陰中風特似言其愈候豈以風屬陽假為陽復之名乎柯氏曰脈澀與長不是並見澀本病脈澀而轉長病始愈耳此亦一說有從內者暴煩下利是也此條舉客以明主太陰當發身黃以上是客詞此太陰非謂寒實本病唯是指中焦脾家而言猶食谷欲嘔者屬陽明之例即言脈浮緩手足自溫小便不利者為中焦濕熱故當發身黃也若小便自利以下是主詞言寒實本病倘脈浮緩手足自溫者為陽復寒去之兆縱有首條諸證及小便自利必暴煩下利日十餘行而愈即是脾家陽實寒積腐穢自去之徵也若小便自利不能發黃二句在陽明篇則為燥結之驗在本篇則為裡寒之故矣以上一出臆見甚似迂曲然參互審考義不得不然何則金匱黃疸篇以寸口脈浮而緩為其正脈是與本條相發可知浮緩非表邪而屬裡熱蓋裡熱外熏而脈浮者白虎證是也緩之為熱見素靈及平脈法手足溫一證小柴胡梔豉兩條有之亦系內熱所致是知此脈證在陽病見之則為裡熱之候陽明篇舉以別胃實燥濕之分也今寒實而見之何以謂為陽復之候曰少陰篇曰少陰病脈緊至七八日自下利脈暴微手足反溫脈緊反去者為欲解也雖煩下利必自愈此明以手足溫為愈候而錢氏解緊去謂緊峭化而為寬緩此意甚佳且少陰厥陰並以脈浮為欲愈乃知此脈證在陰證見之者固與陽證不同要之本篇此條揭此脈證以辨明濕熱發黃與寒實愈候耳又太陽下篇及辨脈法有以手足溫為愈候者亦當並考抑病既在裡故無所復傳唯自實而虛必變為少陰義如上說更有寒去而實存實以生燥仍變陽明者陽明篇第三十二條若不轉失氣者初頭硬後必溏此蓋與欲作固瘕者均屬寒實故攻之則脹滿不能食也其後發熱者云云乃言有寒去之後或變熱結者至如厥陰之燥熱則恐非寒實之遽變者也太陰一篇從無確解愚涵泳數年徵之病者定為寒實後得脈經中語竊謂益為著切因不自揣立說如上蓋本篇不過僅僅數條而陽明篇中反多本病證候此以其病雖有寒熱之異而部位與壅實則同故恐人錯認對舉明之也曰不能食名中寒曰欲作固瘕曰攻其熱必噦曰欲作谷疸曰飲水則噦曰食谷欲嘔曰寒濕在裡皆是已然猶冒以陽明故諸家未之察亡友世緝嘗特論之唯未斷為寒實稍與愚見異焉金鑑以厚朴生薑半夏甘草人參湯移入本篇其候雖類彼則氣滯虛滿耳實不同也柯氏以三物白散移入亦不辨部位之有殊者也述少陰病少陰病者表裡虛寒證是也有直中焉有傳變焉是故有專於表者有專於裡者然至其重則俱無不涉表裡矣直中者所謂發於陰者也其人陽氣素衰邪氣之中不能相抗為其所奪直為虛寒者矣而有輕重之分蓋里未甚衰表專虛寒者邪氣相得以稽留表故猶有發熱此病為輕如麻黃附子細辛甘草二湯證是也柯氏曰本條當有無汗惡寒證趙氏曰少陰發汗二方雖同用麻黃附子亦有加減輕重之別故以加細辛為重加甘草為輕辛散甘緩之義也徐氏於甘草湯下曰此較加細辛者易甘草為調停其藥勢之緩多矣因細詳立方之意言少陰病二三日比初得之略多一二日矣日數多而無里證寒邪所入尚淺是以陰象不能驟發故將此湯微發汗微云者因病情不即內入而輕為外引也按三說並妥里陽素弱表氣從虛者其感邪也表裡徑為虛寒蓋所謂無熱惡寒者此病為重如附子湯證是也附子湯二條傳變亦有如此證其方亦在傳發所必須故注家未敢謂為直中但成氏引無熱惡寒以解之似有所見今詳其文曰背惡寒曰身體痛手足寒骨節痛俱為表寒之候蓋陽氣素虧筋骨乏液寒邪因以浸漬所致故不似麻附證之有發熱設自非裡虛何以至此寒盛乎然則其兼見裡寒證者亦可推知也其方與真武相近而彼主在內濕此主在外寒何則此附子倍用所以走外術亦倍用所以散表蓋仲景用術多取治表用人參者固以救素弱之陽並制朮附之燥也千金用此方治濕痹緩風及指迷方於本方加甘草用蒼朮名朮附湯以治寒濕俱足互徵此證之為表寒矣先兄曰附子之性雄悍燥熱散沉寒壯元陽生則其力特猛救里陽乎垂脫之際炮則其性稍緩走表分以溫經逐寒前輩所辨殊屬踳駁此言能發未逮之祕但率意論之似治表宜力猛治里宜性緩此殊不然蓋裡虛驟脫非急救則不可所以用生附寒濕纏綿過發則無功所以用炮附也傳變者有自太陽病者有自少陽病者有自太陰病者大抵陽之變陰皆因其人胃氣本弱醫不知回護汗下失法而陽虛胃寒以為此病更有雖不被錯治遂為邪所奪因而變成者其自少陽病及不經錯治者並多所驗見然經無明文豈意在言外者乎又桂枝證多變為陰義述於太陽中更有盛人初得太陽遂變本病者賤役勞形最多有之殆以陽有餘於外而不足於內之故乎其變自太陰詳述於前倘其自太陽而表熱仍在者先救其里後救其表如四逆桂枝二湯各施證是也厥陰篇下利清穀不可攻表亦為表裡並有者而言又桂枝人參湯系其輕證程氏有說宜參桂枝加芍藥生薑人參新加湯與此稍異並録於兼變中既無表證一系虛寒者隨宜為治如乾薑附子湯茯苓四逆湯芍藥甘草附子湯等證是也上二方證從無確解柯氏分為緩急實似葉當其云有救陽救陰之異者恐不然也今玩文勢方意以臆測之其病輕而來急者屬乾薑附子湯何則晝日煩躁不得眠比之躁無暫安時之孤陽絶陰有夜而安靜之異況未至厥逆其方亦藥單捷而劑小蓋單味則其力專一可以奏效於咄嗟而劑小則不足以對大敵矣其病重而來緩者屬茯苓四逆湯何則云病仍不解蓋是緩詞其方亦藥重復而劑大蓋重復則其力泛應少直搗之勢而劑大則可以回倒瀾矣芍藥甘草附子湯互舉於兼變中又甘草乾薑湯為虛寒輕證亦列在兼變中茯苓前輩稱為益陰愚謂滲利之品恐無其功蓋脾胃喜燥而惡濕其燥必暖陽氣以旺其濕必冷陽氣以衰水穀淤溜津液不行苓之滲利能去水濕此所以佐姜附以逐內寒與理中之術其理相近矣傳變無專表寒者傳變必經表熱則其理明矣直中麻黃附子證或差其法必為裡寒如太陽中篇四逆湯證是也此條周氏注為優又曰若不差必曾服汗藥矣亦似是蓋雖列太陽中實系少陰顧是其初發熱頭痛脈反沉者麻黃附子二湯所宜酌用而醫失其法故至身體疼痛其證殆與附子湯相同而用四逆者或是以其既經誤治陽虛殊甚而更有厥冷等證耳三陰無頭痛是就經絡而言戴原禮既辨其非正法頭痛固有因陰寒上衝明篇小柴胡亦有其例要之至病重者則直中傳變證治無二俱皆以脈微細沉心煩欲寐自利而渴此渴為津脫之故程氏謂上熱者誤矣厥冷外熱等為其正證而四逆湯以溫經回陽實系對治本病僅以脈微細但欲寐為提綱四逆所主於本篇則唯是脈沉與鬲上有寒飲乾嘔者二條已然其證候散見各條則宜會而通之如四逆湯實是溫補諸方之祖其為少陰正治誠不待辨焉陶隱居曰附子烏頭若干枚者去皮畢以半兩准一枚按半兩充今一分七釐四毫比他藥殊輕陶說可疑其重一等者通脈四逆湯證是也下利甚者更溫其內白通湯證是也而重一等者加豬膽人尿加豬膽湯成氏注以反治非是蓋加豬膽之意通脈四逆加豬膽湯吳氏注尤為切實其用尿者亦可類推又豬膽汁或急遽難辦所以有若無膽亦可用之語不必所重在人尿也陶隱居曰薤白蔥白除青令盡此少陰病要領也四逆變方更有如當歸四逆湯之兼滋養通脈四逆加豬膽湯之兼和陰四逆加人參湯之兼救胃皆在本病亦可酌用也此他有兼水氣者真武湯證是也此條既曰自下利而又曰或下利語意重復中西惟忠曰或字下疑脫不字此說是曰小便不利曰或小便利其例一也程知論附子生熟本於張兼善蓋此方證不似四逆證之陽脫故附子炮用有兼寒逆者吳茱萸湯證是也欲死二字不過形容煩躁之狀與奔豚病發作欲死復還止同語例隱隱居曰吳茱萸一升者五兩為正肘後療卒厥上氣淹淹欲死此調奔豚病於本方去大棗加桂半夏甘草千金名奔氣湯千金吳茱萸湯治胸中積冷心嘈煩滿汪汪不下飲食心胸應背痛方於本方加半夏桂心甘草有大腸滑脫者桃花湯證是也按裡寒便膿血之機蓋自下利數日大腸滑脫氣益內陷血隨下溜而來巢源曰血滲入於腸腸虛則泄故為血痢可以見也錢氏謂大腸傷損恐無其理又便膿血非真有如腸癰之膿血雜下蓋腸垢與血同出者巢源痢候有膿涕及白膿如涕語可徵按此三證雖有所兼然不外於虛寒故敢列於此至其變則有變為陽者或自表寒此出臆揣蓋表寒而陽鬱於里之人其始得邪為直中輕證而及其傅里變為熱候是也但表寒裡熱理似可疑然附子瀉心湯證固為表陽虛而里有熱者其機與此相近堅嘗見數人冬月薄衣犯寒始得麻附細辛湯證用之五六日變為胃實與以承氣而愈於是知病之為變無所不有也或自裡寒亦出臆揣蓋病未篤而溫補過甚或陽既復而仍用姜附遂生哄熱者是也孫兆曰有本是陰病與溫藥過多致胃中熱實或大便硬有狂言者亦宜下也可以徵焉而熱壅半表裡者四逆散證是也此證不用小柴胡者以其壅鬱非枳實芍藥不能開泄不用大柴胡者以胃無實結蓋邪壅半表裡而為厥者何啻少陰變來其揭於本篇者亦在使人與寒厥對看乎胃家熱實者大承氣湯證是也郭雍有初與四逆後用承氣按及孫氏所云即此也以愚測之此證自表寒變來者為多如裡寒者政使溫補太過恐不遽變為胃實也周氏曰自利至清水而無渣滓明系旁流之水可知痛在心下口且乾燥其燥屎攻脾而津液盡爍又可知矣故當急下以救陰津此解頗妥中西惟忠曰自利清水之清當興清穀清血之清均為圊字看始與色純青文順飲熱相併者豬苓湯證是也更出兼變飲邪搏聚熱並血分者便血及便膿血可刺證是也熱在膀胱即熱結下焦之義不是斥言淨府桃核承氣抵當二條可徵也然則便血亦大便血明矣陰之變陽王履既曰或有直傷即入而寒便變熱及始寒而終熱者其言雖是猶未明鬯如注家傳經熱邪之說則輯義既辨其謬矣或以為本篇熱證本系陽病不必自變成以其相似仍對示之耳然以承氣三條言之如口燥咽乾自利清水猶可云爾至腹脹不大便則少陰豈有此證其說不同從有變為厥陰者蓋少陰之極更有二端陰陽俱敗以就暴脫者有下利亡陰而孤陽上燔者如心中煩不得臥咽痛咽瘡並繫上焦燥熱故黃連阿膠豬膚苦酒諸湯皆為潤法蓋病既涉厥陰者也此實懸料之言然此諸方證皆以潤為主不似變陽諸證之必要清涼者知是亡陰虛燥稍近厥陰矣醫學讀書記曰少陰陽虛汗出而厥者不足慮也若並傷其陰則危矣是以少陰厥逆舌不幹者生乾者死斯言稍是然似不知少陰之變為厥陰者矣黃連阿膠湯與梔豉一類然此以潤為主蓋以非邪熱壅鬱故耳程氏曰少陰之有咽痛皆下寒上熱津液搏結使然無厥陰撞氣故不成痹但視氣勢之微甚或潤或解或溫總不用著涼藥此說頗當蓋治咽諸方要是治標之法已又勞瘵病極為咽痛其理則一徐大椿注苦酒湯曰疑即陰火喉癬之類為當豬膚諸說不一按儀禮聘禮膚鮮魚鮮臘設扃鼎注曰膚豕肉也唯燖者有膚疏曰豕則有膚豚則無膚故士喪禮豚皆無膚以其皮薄故也又禮記內則疏曰麋膚魚醢者麋膚謂麋肉外膚食之以魚醢配之今合考之則膚是為肉之近外多脂者古義瞭然無庸別解矣又錢氏以熬香屬豬膚誤苦酒湯刀環刀即古錢今猶傳世其形狹長柄端有環以安雞卵甚適好述厥陰病厥陰病者裡虛而寒熱相錯證是也其類有二曰上熱下寒曰寒熱勝復其熱俱非有相結而以上熱下寒為之正證提綱所揭其義可見也注家多混合為說誤矣蓋物窮則變是以少陰之寒極而為此病矣其機既詳於少陰中然亦有自陽變者少陽病誤治最多致之以其位稍同耳少陽邪壅胸脅本病熱在上焦柯氏曰少陽咽乾即厥陰消渴之機胸脅苦滿即氣上撞心之兆心煩即熱之初不飲食是飢不欲食之根喜嘔即吐蛔之漸故少陽不解轉屬厥陰而病危厥陰病衰轉屬少陽而欲愈如傷寒熱少厥微指頭寒不欲食至數日熱除欲得食其病愈者是已此說稍當蓋平素陰虛上盈下虧者多遽變厥陰更有自陽明病過下者開於陽明病中又麻黃升麻湯條證明繫上熱下寒而云傷寒六七日大下後則可知陽證過下變為厥陰蓋彼條其方可疑其證不可疑矣其為證也消渴氣上撞心心中疼熱飢而不欲食者上熱之徵也氣上撞心者邪火上迫所為心中疼熱者懊憹之甚也飢而不欲食者以熱壅上焦故腹中雖飢不欲食瓜蒂散證亦有飢不能食蓋涎與熱其因雖異其情則相似食則吐蛔下之利不止者下寒之徵也下寒謂中下二焦楊氏所謂熱在上焦而中焦下焦虛寒無熱耳是也金匱濕病有丹田有熱胸上有寒之語先君子錯易寒熱字為之說曰巢源有冷熱不調候云陽並於上則上熱陰並於下則下冷而無上冷下熱之證其故何也蓋火性炎上水性就下病冷熱不調則熱必浮於上寒必沉於下是所以無下熱上冷之候也凡誤下之證下焦之陽驟虛氣必上逆則上焦之陽反因下而成實以火氣不下行故為上熱下冷之證此言誠發本病之理蘊故今更拈於茲又嶺南衛生方載李待詔瘴瘧論云余觀嶺南瘴疾證候雖或不一大抵陰陽各不升降上熱下寒者十蓋八九況人之一身上焦屬丙丁火中焦戊己土下焦壬癸水上固常熱下固常冷而又感此陽燠陰濕不和之氣自多上熱下寒之證也此亦一理仍附存之是寒熱二證一時並見者故治法以溫涼兼施為主如烏梅丸實為其對方吐蛔之機從缺詳釋以意揣之蛔去寒就溫故上入其膈蛔在膈故心煩然膈上非蛔宜久留之地故旋下於胃故須臾復止胃陽無權雖得食徒增濁壅故嘔而蛔亦隨動故又煩也蛔聞食臭出者言蛔為食入而不安其所復出上膈乃勢不得不從嘔而出此所以其人當吐蛔也再按得食似非謂食畢之後或是及稍下箸則嘔又煩也此為蛔聞食臭而上出於膈之故驗之病者往往為然上說未必是然提綱有食則吐蛔之語姑兩存之陶隱居曰椒去實於鎗中微熬令汗出則有勢力又當歸本草稱溫中而古方多用散寒蓋此方所用亦取溫散且本病虛燥特用姜附殆畏其僭故更配參歸是潤養之功亦自寓其中矣乾薑黃芩黃連人參湯亦宜適用矣此條不必謂本病正證然其方固清上溫下故用治本病屢見應驗喻氏曰本自寒下是其人之平素胃寒下利也張氏曰本自寒下其人下虛也並似未穩要其訛脫不得強解然大旨不過本是胃虛膈熱醫誤吐下故熱搏於上而冷甚於下也醫復吐下之復當為反義讀黃元御曰本自內寒下利醫復吐下之中氣愈敗寒邪阻隔胃氣更逆脾氣更陷吐下不止若食方入口即吐者是中脘虛塞而上焦有熱宜乾薑黃連黃芩人參湯乾薑人參溫補中脘之虛寒黃連黃芩清泄上焦之虛熱也此說稍妥又黃仲理曰翻胃之初亦可用止逆而和中也柯氏曰凡嘔家夾熱者不利於香砂桔半服此方而晏如更有上熱下冷輕證出兼變熱鬱又滯下勞瘵痘𤺋等其病之極為上熱下冷者多難治寒熱勝復者其來路大約與前證相均而所以有勝復者在人身陰陽之消長與邪氣之弛張耳本篇第九條汪氏注以寒熱勝復證分為自愈陽脫陽復不及陽復太過四等殆為詳核魏氏則哂程氏勝復之說多見其不知量矣張兼善曰陽極則陰生陰極則陽生此陰陽推蕩必然之理也易云窮則變窮者至極之謂也陽至極而生陰故陽病有厥冷證陰至極而生陽則厥逆者有發熱之條凡言厥深熱亦深者乃事之極而變之常亦篤論也第七條錢氏補復發熱三日利止七字其說甚精或曰按上下文不必補而義自通何者云厥反九日而利故承以凡厥利者云云文脈相連接蓋食以索餅而熱來者必在厥九日之後是一日後日脈之即指其翌是一日旦日夜半愈是一日併為三日故下文結云復發熱三日並前六日為九日也果如錢言則冒首至三月利止自為一截殊覺語意重復此說或有理按此證食索餅後分為三證一為不發熱而自愈此胃氣有守不為食而泄能食乃為佳兆一為除中暴熱來出而復去一為熱來而續在者錢注缺瑩故輯義引汪魏以糾補之尤氏曰不發熱不字當作若謬矣第十條厥者必發熱程氏曰厥必從發熱得之恐不然軒熙曰本經必字多預決定日後之辭此言為是蓋此章言熱伏於內而厥見於外之證或有前厥者是熱先郁里後日必熱發於外或有前熱者是熱先外達後日必熱閉於內而厥矣必發熱後必厥二句是雙關法且既言厥當下之則此厥明屬熱鬱所致實以外厥之微甚卜裡熱之淺深也其證厥熱各發不一時相兼故治法方其發熱則用涼藥方其發厥則用溫藥調停審酌始為合徹倘失其機必為偏害矣秦氏傷寒大白曰厥少熱多熱不除必便膿血可見熱病回陰陰證回陽均怕過與不及是也喻氏曰按厥陰篇中次第不一有純陽無陰之證有純陰無陽之證有陰陽差多差少之證大率陽脈陽證當取用三陽經治法陰脈陰證常合用少陰經治法厥陰病見陽為易愈見陰為難痊據喻此說本篇清涼諸方恐其為陽勝而設溫補諸方為陰勝而設也唯中間有不必系本病者豈不過以類隸之乎當歸四逆湯條錢氏柯氏注固是或曰此條之厥當厥熱勝復之厥蓋其寒本輕但一時血氣不通仍致厥寒而亦有熱伏於內故用姜附則恐後日有喉痹口爛便膿血等之變此所以別立一方主治之也此說難從又程氏曰血虛停寒不特不可下也並亦難用溫蓋慮姜附輩之僭而燥也須以溫經而兼潤燥和陽卻兼益陰為治周氏曰至通草本經稱其通利九竅及血脈關節則諸藥亦得通草之功破阻滯而散厥寒矣兩說亦失當姑録備考此厥陰病要領也仲景舉死證者少陰特多而厥陰反少此理甚妙人身以陽為重厥陰則寒熱相錯用藥有所顧忌然比之少陰之純寒猶有陽存耳周氏載陳氏少陰厥陰之辨其說缺核故不録要之上熱下寒與寒熱勝復均無所傳其唯陰陽和平病當快瘳焉
