body:
  text: 傷寒論述義補是書刊布有年頃又得數解因錄於下以示子弟辛亥清明日元堅孫真人演風論之義辨表虛表實之分在病者之素稟其言雖發諸風而發亦足以該疾病之常理學者宜參考其藏有寒下焦虛有寒此太陰少陰分別處藏字與藏寒蛔上入膈之藏同義少陰而云下焦虛則太陰之不下焦虛可知矣腎者胃之關也今下焦有權故胃陽亦有攝而津液能持此寒氣之所以得內實也少陰則下焦虛衰故胃陽不攝而津液下脫此寒氣之所以不得內實也然則寒實寒虛之所以有分者正在其人腎氣之強弱也雖然少陰病固必並其中焦而虛觀諸其諸證與其方藥而可見矣且下元之虛非可遽復唯其溫中散寒以能達下焦此所以不用補腎之劑而特有取於四逆也前述於成氏太陰少陰分中焦下焦之說以為恐誤又不謂少陰病為兼下虛者俱由研理之未密已下利腹脹滿身體疼痛此太陰兼太陽者其里證重故先里後表太陰篇桂枝湯條其里證輕故先表后里宜相對看證治要訣論太陰病曰腹滿而痛當得通壅宜桂枝湯加芍藥復庵此言先獲我心苦酒湯半夏如棗核十四枚十字疑大字訛成本玉函核下有大字此可以徵然彼亦剩十字也蓋僅是一雞子殼須用四枚適協其量厥陰篇第七條倘用前述或說則食以索餅不發熱者調治經曰厥利俱止者誠不待言後日脈之其熱績在者其利止亦可知也又後日成本玉函作後三日然則並旦日為四日而熱多厥一日仍知其非厥陰篇不結胸腹濡軒村寧熙曰照前病者手足厥冷條濡當作滿字之誤也果是腹濡則其不可下誠不俟言此證使人疑誤處正在虛燥腹滿所以致禁也此說覺當三陽合病遺溺似非白虎證所有此二字疑當在發汗則讝語下風溫被下則直視失溲其汗下雖殊為上盛下虛則一也風濕相搏二條俱系表虛寒證雖濕邪淹滯猶與少陰直中同情而其三方亦即麻黃附子二湯及附子湯之例耳揚雄方言水中可居為洲三輔謂之淤郭璞曰音血瘀此古人以音載義者可以徵瘀之為淤矣外臺所引經文異同或有輯義所未採者今照宋本略揭數端白虎加人參湯人參二兩按經文趙開美本於太陽上篇則三兩於下篇則二兩粳米一升注曰玉函經用糯米按今本玉函用粳米又引千金翼亦作一升按今本翼方佚此方文蛤散條病在陽作病在太陽柴胡桂枝幹薑湯條微結無微字黃芩二兩半夏瀉心湯條止卻發熱汗出而解別出論傷寒日數病源中蓋自為一條也余嘗撰釋瘟一篇雖非經義姑附之以備參考曰瘟疫之瘟與溫病之溫其義不同何以言之疫之行也不論四時而其證每異何必冬傷於寒而春病者與發熱而渴不惡寒者乎考瘟之為名猶疫也肘後方曰其年歲中有癘氣兼挾鬼毒相注名為溫病又曰道術符刻言五溫而所謂闢溫諸方亦闢疫之謂也楊玄操注五十八難曰溫病則是疫癘之病非為春病也此說於經義則乖集韻曰瘟烏昆切疫也據此則瘟之為疫其徵甚確而天行多熱許仁則既有其言此疫之所以亦名為溫也瘟疫重言猶疫癘重言之例耳六韜云故人主好重賦斂大宮室多遊臺則民多病溫此文今本所逸群書治要引之茲從孫同元輯本錄後漢書五行志注亦有此語溫作瘟論衡命義篇曰饑饉之風餓者滿道溫氣疫癘千戶滅門又治期篇曰人之瘟病而死也先有凶色見於面部並可以徵瘟之為疫但瘟本作溫其從疒者蓋後人所改寫已又傷寒例所謂更遇溫氣變為溫疫者即對寒疫而言亦是一種病也要之溫之名義不一亦猶傷寒之有謂寒氣所中者有謂邪氣表實者有謂外邪總稱者之類學者不知牽混為言者誤矣蔡邕獨斷有瘟鬼文然抱經堂校本為瘧鬼訛論衡訂鬼篇亦作瘧鬼又廣雅有殟字蓋瘟之異構跋我茝庭先生向著傷寒論述義既已大播於世頃又有所發明更譔補義將附以行熙庸劣又復何言先生常誨熙輩曰讀醫經與他書異若讀是經當虛心平氣就其至平至易處研性命之理使文義與治術如吻合而符契也然為之有本必也博徵諸載籍多驗諸疾病之實會萃諸本經優柔厭飫浸潤涵泳真積力久始足以應變無窮焉此之謂善讀者矣世或有穿鑿拘泥固執偏見者有膚淺浮疏而無心得者有徒騖論辨而不察證治之要者有專拘字訓而不究微意之所在者此皆不善讀之過也世又有一種固陋之弊其人本無學識徒臆測懸揣以為得經旨倘有不合己意者概謂之後人攙入肆然刪改之此直夏蟲疑冰越犬吠雪之類耳蓋據經以察病者此其常矩亦有由驗病而悟於經義者此理不可不察焉又曰讀書之法務遵古人古人之言既妥矣固無須贅說而亦且鬥博誇多更生意見左傅右會渫渫眩矅謂之無用之辨吾不取也又曰凡讀醫經遇訓義有確據則舉其一二而足矣不必取於繁冗也又曰訓詁雖似精而其義不切於治者未可也訓詁雖得或不精而施之於術必有實效者乃為得經意已乃立說者非通貫全經則不可謂之盡理蘊非該盡萬理則不可謂之得經意矧乃欲以變律常及拘於常而不通變者皆不善讀之過也此數言者其皆講醫經之寶筏與讀先生之書者先了知此理庶乎其可矣蓋先生蚤承家學最湛思於此經凡義理之聚訟難決及治術之同異得失必徵之古人驗之病者考據精確剖析明白無一毫張門戶之私無一言不益於實際其闢從前之未逮而發張子之微意者奚俟熙輩之讚揚熙也門下瑣材進不能恢其道以裨於世退未能淑其教以仁於人仍不揣檮昧特揭其所聞以書於其後亦庶幾學者有所向方云嘉永四年辛亥六月筑前日葉元熙謹識
