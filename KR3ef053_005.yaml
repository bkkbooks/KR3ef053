body:
  text: 卷五述霍亂霍亂編在本經未審意義汪氏以為雜病論所錯或曰厥陰篇有吐利諸條後人以霍亂亦有吐利仍摭於雜病中以附其後正與痙濕暍俱有表證故揭在太陽之前同其例但彼則金匱具載此則金匱不錄故令人無知其為雜病論之遺者且脈經敘霍亂轉筋在百合狐惑後中風歷節前外臺引本篇曰出第十七卷中並可徵也此說似是霍亂者內有所傷外有所感揮霍之間便致撩亂是也霍亂所因巢源千金其說明核蓋本諸肘後要之內無飲食宿滯何以有腹痛吐瀉外無邪氣感觸何以有揮霍撩亂可知外內相搏而癸矣其病大抵夏秋為多而或因傷暑或因失覆受冷然春溫冬寒亦間有之蓋其邪雖不一唯飲食傷則均所不免云伊澤信恬曰易說穀雨氣當至不至則多霍亂春秋考異郵襄公朝荊士卒度歲愁悲失時泥雨暑濕多霍亂之病並太平御覽引漢書嚴助傳夏月暑時歐泄霍亂之病相隨屬也此霍亂之名見古書者亦可以資霍亂所因之考證焉其證內而清濁相干心腹攪刺上吐下瀉靈樞經脈篇足太陰之別名曰公孫云云厥氣上逆則霍亂又五亂篇清氣在陰濁氣在陽營氣順脈衛氣逆行清濁相干云云亂於腸胃則為霍亂王肯堂曰巢氏乃因此一條霍亂必有腹痛經不言者蓋省文也外而邪正相搏發熱頭痛身疼惡寒成氏以此諸證為霍亂兼傷寒非是尤氏注又利止復更發熱曰迨利止里和則邪氣復還之表而為發熱今人吐利之後往往發熱煩渴者是也施治之法以里為急即先溫其里之例也其病輕者有熱多寒多之分俱以去胃濕為要而有五苓理中之別寒熱分關亦在其人胃氣強弱然不比傷寒寒熱之異俱是中焦清濁相干者故治方不敢在清涼溫補上而分唯以去胃濕為第一義縱其邪熱相得而欲飲水者亦不過分清水穀以為之治而已蓋用五苓散使水從膀胱去則清濁自分吐瀉自止而邪亦從解矣如其胃虛寒則理中丸以散寒溫胃則寒濕去而中焦和矣徐大椿所謂五苓所以分其清濁理中所以壯陽者深得其理神農本草經疏曰術能燥濕濕去則脾健故曰補也寧知脾虛而無濕邪者用之反致燥竭脾家津液是損脾陰也何補之足云亦篇論也又簡易方理中丸下曰其圓者得蜜而潤入脾為快溫補為宜若以盪滌寒邪祛逐冷積則湯為捷且免蜜之殢脾也理中丸為丸如雞子黃許大考本草序例陶氏以為準十梧子唐本草以為準四十梧子詳錄於大陷胸丸下按外臺引仲景論云霍亂臍上築者腎氣動也先療氣理中湯去朮加桂凡方加朮者以內虛也加桂者恐作奔豚也理中湯方人參二兩余並三兩煮服加減法文有少異今不具錄次有一條及附子粳米湯方並系本經所佚云又霍亂臍上築者以吐多故也若吐多者理中湯主之方如前法加減霍亂四逆吐少嘔多者附子粳米湯主之方附子一枚炮去皮破六片半夏半升洗完用甘草一兩炙大棗十枚擘粳米半升上五味切以水八升煮米熟去滓溫服一升日三小品千金同出第十七卷中一方有乾薑一兩今詳千金有乾薑云仲景方無其重者陽乏寒盛則更次第療之猶少陰之例一以回陽為主如四逆湯此條發熱恐亦虛陽外越之熱又轉筋一證經不言者豈以四肢拘急即蘊其義乎通脈四逆湯通脈字今補此條小便複利與厥陰篇嘔而脈弱小便複利其機相同及加豬膽湯錫駒注本於志聰志聰注及錫駒明礬說並系高世栻言四逆加人參湯此證較之通脈四逆殆乎寒輕於彼而液燥則稍加者矣尤氏曰此條本非霍亂證仲景以為霍亂之後多有裡虛不足而當溫養者故特隸於此歟此說誤矣是也其里和而表未和者用桂枝湯即乃攻其表之例也尤氏曰曰消息曰小和之者以吐利之餘裡氣已傷故必消息其可汗而後汗之亦不可大汗而可小和之也消息字醫賸有說又枚乘七發從容猗靡消息陽陰又古本玉篇消字下曰周易尚消息盈虛天行也野王案消息猶斟酌也霍亂證治實不外乎此數端唯許仁則乾霍亂論能發仲景未言之秘故明理論既表而出之述差後勞復陰陽易一證無義可述仍不贅差後勞復者大邪既解陰陽未諧早有勞動餘熱復集是也此本於巢源熱必自內發故枳實梔子湯為其對治此條不舉其證想心煩不眠等為所必有也徐大椿曰勞復因病後氣虛邪氣又結於上焦其症不一故不著其病形惟散其上焦之邪足矣後人以峻補之劑治勞復則病變百出矣此說與汪氏同而似得當蓋此方屬梔子厚朴湯之類則亦不外乎清膈利滯也如成氏以為吐劑錢氏以為發汗周氏以為食復之治皆似未然方後覆令微似汗五字可疑或是因有發汗用豉者而誤附之也說文漿酢漿也從水將省聲本草玉石部下品新補云漿水味甘酸微溫無毒又云粟米新熟白花者佳煎令醋止嘔噦朱氏本草衍義補遺曰漿水味甘酸而性涼善走化滯物解消煩渴又張氏本經逢原曰以水空煎候熟極煮藥名清漿水取其下趨不至上湧也謬如小柴胡湯亦其正治也此與上方證病位不同然其熱自內發則一也如脈浮者病後新感也如脈沉實者熱實於胃也此證恐不必食後蓋勞復亦有為胃實者且巢源傷寒勞復候曰其脈緊者宜下之是與原注所云相合又可下篇曰傷寒後脈沉沉者內實也下之解宜大柴胡湯並可證焉如竹葉石膏湯證胃液不復虛熱上逆者也此條成氏謂津液不足而虛羸餘熱未盡熱則傷氣故少氣氣逆欲吐諸家概從之然愚竊疑虛羸少氣氣逆欲吐似無些熱何以主以清涼又疑玉函所載勞復發熱者麥門冬湯主之亦似證方不協因以為恐是兩條其方互錯此條虛羸少氣諸證蓋麥門冬湯所主即與金匱大逆上氣咽喉不利止逆下氣相類彼所謂勞復發熱者卻是竹葉石膏湯證然實系臆揣姑錄俟識者外臺古今錄驗解五蒸湯於本方去半夏麥門冬加茯苓葛根乾地黃知母黃芩如枳梔之加大黃蓋所謂食復也熱論曰病熱少愈食肉則復多食則遺此葛巢諸家所本醫心方引經心方云胡粉十二棋博棋者大小方寸是也如牡蠣澤瀉散證輸化不職水氣外盜者也成氏曰金匱要略云腰以下腫當利小便與牡蠣澤瀉散利小便而散水也按此方栝樓根蓋取之淡滲不取其生津金匱治小便不利者有水氣用栝蔞瞿麥丸可以相證而本草則曰止小便利未審何謂如理中丸證胃虛而上焦有飲者也胸上諸注多作胃上然他無此稱愚意喜唾不了了是胸上有寒所致而胸寒必生於胃寒故用理中溫胃以達上焦也膈上有寒飲用四逆金匱肺中冷多涎唾用甘草乾薑湯並是一理金匱又曰上焦有寒其口多涎又曰色黃者胸上有寒此二證者蓋不過以其系病後隸之實不必勞復也病邪解除既至勿藥則唯任調養醫之能事於是畢矣是故結以損谷則愈亦所以例百病也矣附答問問傷寒既為外感總稱則後世謂仲景專為冬時正傷寒立言者其謬不待辨而知但其以為外感總稱前人更有此說否審子和意蓋原之叔和謂溫熱瘧痢等疾皆因冬傷於寒重感時氣故以傷寒該之恐難取信且仲景所以命書者果總括風寒溫疫至暑濕瘧痢等之詞乎或又言仲景略於溫疫不知實然邪曰成氏注傷寒例凡傷寒之病多從風寒得之曰凡中風與傷寒為病自古通謂之傷寒又劉河間傷寒直格曰寒邪為害至大故一切內外所傷俱為受汗之熱病者通謂之傷寒也此二說者稍為近張景岳之言亦同之然要未為明鬯是以輯義不復繁引也如夫所謂外感總稱者亦豈總括諸般外邪之云乎蓋本經者擴而充之猶足以療內傷諸疾而況於外感誠莫不該盡其理焉然立論之本旨則仍不過風寒二邪與時氣瘟疫也何者暑之傷氣濕之流關節及痎瘧滯利之類並各有定證而藥亦各異其宜惟病之變化百端狀態不一者莫風寒如焉如時氣溫疫本自為一種病有晉唐諸家之言可徵矣但其證雖邪焰或勝乎其病情固與風寒不殊則治法無須別設處分觀仲景以暑濕等疾揭之雜病中而時氣溫疫不更立標目其意可見也唯邪氣必因人而化不得在風寒時氣溫疫上區別其證候故仲景所云中風傷寒溫病等僅是假其名以形容其病機者而述作本旨仍非概風寒時氣溫疫稱之為傷寒而何也倘參以難經傷寒有幾之語則其義更燦然矣後世如吳又可雖巧為炫張而要其歸則實不能出仲景藩籬之外但是踵事加精則有之矣謂仲景略於溫疫奚可乎難經分為五證傷寒例論傷寒時行之異巢源立傷寒時氣熱病溫病疫癘五類外臺立傷寒天行溫病三門今熟審諸家風寒時氣溫疫庶幾概之矣問冒頭者每章之發題而所繫匪輕閔氏曰有以傷寒二字冠之者如傷寒一日太陽受之脈若靜者為不傳之類兼中風而言者也以傷寒為病多從風寒得之故或中風或傷寒總以傷寒稱也其中專稱傷寒不兼中風者如傷寒脈浮不發汗因致衄者麻黃湯主之之類是也有中風傷寒之外如濕病風濕之類亦在論中者以明不可混稱傷寒也有但稱病人但稱病稱厥稱嘔稱下利等證不明言傷寒中風雜病者大概言之也此說似得窾要然更有但冒太陽病者有表虛而冒傷寒者有表實而冒中風者其文法所以不一者未審其義曰冒頭不過喚此起彼之辭或寓脈證於此或示來路於此固不能有定例矣蓋識病之要在立其名而施治之要在就脈證求病就脈證求病則自然情狀發露左右逢原其名亦可從而定倘徒事立名充病則遂不免執吾成見以律萬變焉是故如各篇提綱及太陽分風寒之類此所以揭名示病也題以傷寒而或專稱或兼稱題以太陽病而或言表虛或言表實或虛實該言表實冒中風表虛冒傷寒此皆互文見意所以使人就脈證求病而圓機之妙自此而生焉再如陽明厥陰之多冒傷寒者以其來不一而大概言之之義如陽明病稱姑假為起語而施之類證者亦多有之並是屬變例他云病云病人云某家云發汗吐下後之類諸不冒病名者皆隨宜構文者耳讀者以冒頭與全章參互思索之勿為過鑿則庶得經意矣問諸家註釋逐條更易輯義既闢其非然則叔和之撰次果為得仲景之旨否且其敘次何如取義曰仲景舊本雖隋唐間人猶不能睹而生乎千百年之後欲議撰次之得失不亦傎乎然姑依文義考之仲景之意唯是就脈證而示病始非有渺深難測之趣叔和之撰次大約以事類相從亦欲使人易知辨證措治之方則雖非悉仲景之舊亦匪有大異同譬之周易費氏以來割彖象文言列之各卦之下雖非尼山之真亦無悖於道矣今推事類相從之例以論撰次之意及中間或似後人所錯者具列如下太陽上篇則首章至第十二章以太陽綱領與寒熱大要錯綜為次第八章玉函以來冠之篇首然既以太陽病為篇則以其提綱為始於理相協第十三章至末章皆系表虛一類而第二十七章承上以示大汗後更有一證中篇則首章至第十一章系表實一類第十二章至第二十八章申明發表余義此以下至篇末俱為太陽傳變諸候更析其類則第二十九章第三十章是汗吐下後自愈者第三十一二兩章是下後發汗之逆第三十三章至第四十一章系發汗及吐下後虛證而結以胃實宗印曰本經凡論虛證後結實證一條論正氣後列邪氣一節此造論之章法按此說亦未必然第四十二章至第四十五章即五苓散證第四十六章未持脈時師令咳其義前後不屬恐前汗後虛證中錯文也第四十七章承前欲飲水證第四十八章承前水逆以示有胃虛之吐第四十九章至第五十四章乃梔豉諸證第五十五章真武湯亦似當在前汗後虛證中第五十六章至第六十二章為禁汗之戒第六十三章至第六十七章言病兼表裡者第六十八章據玉函等知上篇之錯第六十九章至第八十二章系柴胡一類而第七十七章承第七十四章第八十章其證與上條相似仍供對看第八十一章桃核承氣湯疑後段瘀血中所錯似當在抵當湯條前第八十三四兩章論縱橫第八十五章至第九十五章系火逆一類第九十六章至第九十九章敘誤吐與嘔吐之證第一百章至第一百二章系瘀血一類末章則承上證示小便利不啻瘀血也下篇亦皆屬太陽所變數證首章至第三章辨結胸與藏結與痞之異第四章至第十五章繫結胸一類而第十四章文蛤散疑中篇五苓散證中所錯也第十六章太少並病第十七八九三章熱入血室第二十章至二十二章太少並病蓋十六章至此因有如結胸狀心下結胸脅滿等證而連類及之也第二十三章至第四十一章皆系痞硬而第三十六章麻杏甘石湯疑為錯出或以次條論下後而連及乎第四十二章至四十四章白虎加人參湯證第四十五六兩章太少合併第四十七章其上章證是外內擾動故承以上熱下冷第四十八九兩章風濕相搏第五十章白虎湯恐宜移在前項加人參湯之類第五十一章是素虛證末章即申前章之義蓋太陽三篇每類必具數條故有端緒可尋其他則大抵各章殊類不易區畫如陽明篇尤覺淆糅闕所不知可也少陽太陰不過寥寥數章少陰亦有難類從然斯三篇約略可思而得矣厥陰則正證與厥利嘔噦界限截然不待辨而後知也如夫各篇中此類接彼彼類承此之意則雖或有可推明者而亦何如六十四卦之有序哉愚亦不欲妄為牽強且待有識論定爾問林億等序稱合三百九十七法未知其指曰此實無謂之言故王氏溯洄集反復糾辨殊為確核而後人更有為說者竟不免附湊如周自閒據趙氏翻雕宋本以駁王氏見吳醫匯講今考宋本每篇之首注共幾法者通計得三百八十七法是王氏所以發疑而周氏檢考不密復吹其燼可哂甚矣問經中脈位多系泛稱而間有指某部者有稱以陰陽者其義何如曰本經脈位實本於十八難以寸口關上尺中配之三焦而更以寸口候表與衛尺中候里與營趺陽亦候胃少陰見辨脈及金匱而亦候下焦大抵病邪瀰漫者各部同狀是以多從泛稱病在一處者脈隨而變是以或直指其部然亦有互文見意處此則在讀者活看已陰陽之名其以為尺寸者恐未可為誤蓋二難以尺寸為陰陽辨脈第三章亦以陽脈陰脈為寸尺又曰寸口關上尺中三處大小浮沉遲數同等雖有寒熱不解者此脈陰陽為和平千金翼方亦曰寸口關上為陽尺中為陰皆可以見矣其以為浮沉者亦理然也然至陰陽俱浮竟覺不通則俱未為確實宜附之闕如可也要其所候唯是不過表裡氣血之分而已問經中脈狀其名凡幾而子且言有常變常變之義所未前聞曰脈名凡二十有六雲浮云沉云數云遲云緩云緊云弦云長云滑云澀云大云洪云芤雲實云小云細云微云弱云虛云短云促云疾云結云代云停云厥是也停與厥義不晰動數之動與數急之急俱言其勢非形狀之謂也所謂常變者一脈各有常與變也假如病在表而熱外盛必見浮脈豈非浮脈之常乎更有裡熱外熏白虎證及陽明太陰傷寒脈浮緩是有邪結上焦結胸及瓜蒂散證是有血分灼熱陽明抵當證是有虛寒陽越四逆證是皆令脈浮豈非浮脈之變乎如沉為里為寒然亦為肌表寒壅麻附辛湯證是為裡熱結實陽明脈沉為在裡是數為熱盛然亦為胃冷客熱病人脈數是為虛寒陽跼少陰病脈細沉數是遲為寒為虛然亦為熱結結胸及大承氣證是弦為寒見金匱然亦為熱盛本經皆然之類皆其義也其一脈所以有數候者在所兼與其位而神之有無固宜意知焉如夫緊之通寒熱表裡而為病實滑之通水燥食屎而為熱盛澀之通為血滯洪之通為邪擾之類皆其一定者也如大有實大有虛大細有微細有緊細之類最須分看蓋脈理玄深貴知其要若柯氏以體用為辨其言雖精猶未襯切學者熟繹經旨參以先人所著脈學輯要則必有思過半者矣問韓祗和曰治傷寒病以脈為先證為後朱奉議曰傷寒看外證為多未診先問最為有準二說適相反今觀經文大抵詳證而略脈是仲景重證而不重脈也曰治傷寒須脈證互參無所偏重經之略脈者多系省文況脈之為類固不如證之繁更有舍脈從證者如傷寒脈浮緩而用大青龍是也有舍證從脈者如身體疼痛而用四逆是也要之病之虛實邪之進退及生死之訣皆靡不於脈而驗則韓氏之言恐不與經錯也問本經於三陽甚詳而三陰殆略呂元膺以為有缺文豈其然乎曰否火動水靜本是定理故三陽傳變多而三陰傳變少況三陰其位相同乎杜清碧曰陽熱之證變態不一三法一差死生反掌非比陰寒之邪不復傳變有一定之治王安道曰若以藥誤治而成變證則惟太陽為多縱使三陰證亦或有寒藥誤治而變寒者然豈應如是之眾乎然則經之略於三陰亦何足怪且陰證之理豈有外於彼三篇乎元膺之言吾不信也問中風之名經中頗多皆可一例否曰名同而義異此經之例中風在太陽則與寒對言為表虛之目在陽明亦與寒對言則為裡熱之義稱陽明中風則為裡熱兼表者在少陽則為其熱殊劇者在三陰則為陽復於表者其義各異倘欲實講風字解為一義乎則必不免牽強如金匱亦為半身不遂為五藏受邪為發狂是可以互證耳問仲景方藥其類有幾湯散丸之別其理如何曰云汗云清云下云溫此為正證之治太陽之於桂麻少陽之於柴胡陽明之於白虎承氣三陰之於姜附諸湯是也云吐云消云補云澀此為兼變之治膈痰之於吐停水之於消虛之於補脫之於澀是也汗清下溫兼變亦施而吐消補澀正證所不須且此八法中細目頗多不可不審湯散丸則藥病各有所宜此其所以有別蓋方劑諸義愚著藥治通義詳論之云問古方權量諸說紛糺准之今制孰能為當曰吾友小島學古尚質嘗從事於此撰為一書云仲景之一銖當今之一釐四毫五絲一兩當今之三分四釐八毫一斤當今之五錢五分六釐八毫一斗今量之一升一合零一撮強升合皆從此酌量凡藥稱幾升者皆繫於藥昇平之非通用之升也但粳米豉不在此例藥升見本草序例其說皆確有根據以足為定論矣如分之名愚謂是裁分之分非六銖之分至其詳說並拈於藥治通義中今不復贅問刺灸之法聞有補瀉仲景所施亦復然否曰用針補瀉詳見靈樞然仲景之針唯是瀉而已所謂隨其實而取之者言隨實之微甚而瀉有輕重也灸艾大率在回陽補虛然針處核起之灸殆屬瀉者也孫真人灸腳氣稱以泄風氣或是一輒虞恆德醫學或問之言宜並考焉問桂枝湯方其病不重者猶曰又不汗後服小促其間半日許令三服盡而至病重者則反曰一日一夜周時觀之服一劑盡病證猶在者更作服是病之輕重藥之多少似有所錯義不可解曰此非錯傷寒例甚明云凡發汗溫服方藥雖言日三服若病劇不解當促其間可半日中盡三服若與病相阻句即便有所覺病重者句一日一夜當晬時觀之是也此言其人中必有奸而藥與之相格因致煩郁使其覺病勢加重者須從容施劑以就其安也楊仁齋曰病人有挾宿恙如痰飲症癖之類又隔汗而不能出即是已所謂服桂枝湯反煩不解先刺風池風府者殆此類也蓋不止桂枝一證往往有如此者切須熟察勿雜藥亂投之弊矣褚氏遺書曰當驗之藥未驗切戒亟投亦此之謂乎金匱耆芍桂酒湯方後曰若心煩不止者以苦酒阻故也蓋與病相阻之阻與此阻字同義問五辛之名無出於輯義所引之外者否曰有荊楚歲時記有五辛盤之稱而不著其品本草菜部韭條引食醫心鏡云正月之節食五辛以闢癘氣蒜蔥韭薤姜如他諸書所載皆道家之五辛與佛家之五辛已山田正珍曰玉函經千金翼無禁生冷云云十五字知是後人所加其言卓矣問火逆驚狂煩躁俱用桂枝豈是發表抑且不擬火熱乎曰嘗聞之庭訓云傷風誤灸煩熱及湯潑火燒救逆湯甚驗湯火傷重者必下利即陽虛所致亦久服之而愈切不可用清涼之劑今推此意則火熱熏灼遽用寒藥冰炭相激必致煩擾猶湯火傷之禁水洗暍死之不可使得冷矣桂之為品雖辛不燥雖溫不僭是以能使火邪之內犯者誘之外越殆所謂從治也蜀漆之治火逆正如茵陳之於黃黃耆之於濕徐大椿所謂藥有專長者乎問吳茱萸湯條子以為所謂屬陽明者唯是指中焦之詞而其實即寒實證然則云得湯反劇者屬上焦也者其義果何汪氏以為膈寒然膈寒必來自胃寒而此方所主如干嘔吐涎沫與嘔而胸滿何不謂之膈寒魏氏以為上熱下冷者豈不優乎曰詳玩語氣魏氏亦失太巧以愚觀之此指少陽之嘔而言也上焦蓋胸脅之互辭耳陽明病脅下硬滿不大便而嘔舌上白胎者可與小柴胡湯上焦得通津液得下云云成氏曰上焦得通則嘔止可以徵焉上熱之嘔倘施溫藥兩陽相激格拒不納所以得湯反劇蓋此條更舉相反之證以示嘔有上下寒熱之別要不過設法備變而已赤石脂禹餘糧湯曰復不止者當利其小便金匱甘草乾薑湯曰若服湯已渴者屬消渴均一例也大抵鹵莽之弊生於略近仲景之慮周是以於平淺易知處往往反復致辨以為不可輕忽之戒故言外生意求之過鑿則去經旨遠矣樓氏曰得湯反劇者火也當用生薑黃連治之似魏氏所本又前輩有謂為小柴胡證者然取徵不確問子既言邪有風寒時氣溫疫而又言病之陰陽因人而化其理奈何曰請審論之蓋風寒雖天之常氣人如體虛必被感觸況時令不正最易為害倘有非常之異氣則眾人同病此愚之所以約為三等也然如叔和實講節氣以立類目亦似迂拘難信前輩駁之盡矣至天行溫疫則其行也每每異證孫真人謂為天地變化之一氣造化必然之理而吳氏雜氣論殆發其秘焉蓋其為氣猖狂厲烈人偶感之則氣血沸亂從而相化猶蟹膏投漆漆化為水皂角入灶突煙煤堅所以眾人之疾大略相似也且不啻溫疫如時氣病雖未敢一定以今驗之二十年前人病多陰比歲以來患者多陽豈是天地間風氣有時變遷或自陰勝或自陽勝而人之體氣必隨應和有所偏勝故其得病亦自相搏仍以致然耶地之南北其病有等理則一也然則病皆無不因邪而變而今以人論者何也寧實求之不敢虛求也夫溫疫之有劇易緩急謂之邪有輕重猶可然更不能無虛實之分況至風寒時氣則最多寒熱之更變邪豈有此等伎倆乎邪雖輕其人弱者病難治邪雖重其人強者病易治是足以知病之必因人而化矣且邪之為物無象可睹假令鑿鑿以究其理要不免揣摩猜度而施治之際果有何益譬猶涔熯然求其所以然之故於茫昧之間遂無補於凶荒也是以醫病之法就其脈證而認得寒熱表裡虛實之真則左右逢原病無遁情固不拘風寒時氣溫疫之辨也寒熱表裡虛實之所以有分必因其人體氣之如何譬猶田疇之有涔熯歟高者旱下者水必然之數也故治田者因其高下以為之防足矣豈何須彼不急之察哉然則病以人而論是求本也是實學也仲景未嘗就邪分病而一以傷寒括之意其在於此乎問子以病情釋陰陽然藏府經絡經有其文則從前注家之說詎可廢乎曰藏府經絡仲景豈敢屏卻唯全經大旨在於彼不在於此爾蓋仲景假之內經以為標識而各自有義矣陰陽者數之可千推之可萬故內經以分表裡而仲景則為寒熱之名如太陽在內經則為邪初傷表者故仲景假之亦以為表熱之名少陽為表之最深者故假之以為半表半裡之名陽明為胃經故假之以為裡熱之名太陰為脾經故以為裡寒之名少陰腎經為陰中之陰而腎主液故以為虛寒而液脫之名厥陰為陰之所盡物極則變故以為寒熱相錯之名顧其意義如是而已如曰陽明居中主土也曰以脾家實腐穢當去故也曰以下焦虛有寒不能制水之類亦是不過姑假其名以示病位病情也至經絡之說則如曰太陽病頭痛至七日以上自愈者以行其經盡故也曰太陽病過經曰到經不解曰以太陽隨經瘀熱在裡故也之類不出僅僅數章則明自為一義矣亦活看之可也注家或堅執其文又憑諸證中間有與經絡合者遂律全經以經絡藏府之義焉雖然倘一以經絡讀之乎其義往往窒而不通如每病必分經腑之類則尤失之支離牽強矣唯以病情讀之無所之而不通而其與經絡合者亦無庸煩說迎刃而解假令如頭項強痛之邪熱在表勢必上浮使然余可隅反也且如陽明太陰之治但涼溫之差而無脾胃之分少陰專任溫中而不專滋腎是可見其不必要分各藏各府也此經文之所以不皆主張藏府經絡也抑又由此而推知內經之以經絡仲景之以病情其理一如王程二氏之言焉故今自提綱至勞復一以病情貫之徵之經文既無前後之牴牾驗之事為亦莫切近乎此是愚所以立此說而實本諸庭聞云爾
